<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softball Stats Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f2937">

<style>
body{margin:0;font-family:Arial;background:#1f2937;color:white;}
.container{padding:15px;}
.player{background:#374151;padding:12px;border-radius:12px;margin-bottom:12px;}
input{width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:10px;}
.row{display:flex;gap:10px;}
button{flex:1;padding:12px;border:none;border-radius:12px;font-weight:bold;}
.out{background:#ef4444;}
.hit{background:#d1d5db;color:black;}
.hr{background:#22c55e;}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.btn-white{background:#f3f4f6;color:black;}
.btn-blue{background:#3b82f6;color:white;}
.btn-yellow{background:#facc15;color:black;}
.card{background:#374151;padding:12px;border-radius:12px;margin-top:15px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px;border-bottom:1px solid #555;text-align:center;}
</style>
</head>

<body>

<div class="container">

<!-- 🔥 LIDERES -->
<div id="leaders" class="card"></div>

<!-- 🔥 BOTÓN INSTALAR -->
<button class="btn-blue" onclick="installApp()">Instalar App</button>

<div id="players"></div>

<div class="actions">
  <button class="btn-white" onclick="saveDay()">Guardar día</button>
  <button class="btn-white" onclick="showHistory()">Historial</button>
  <button class="btn-blue" onclick="ranking()">Ranking</button>
  <button class="btn-yellow" onclick="newSeason()">Nueva temporada</button>
</div>

<div id="output"></div>

</div>

<script>

// 🔥 DATOS
let history = JSON.parse(localStorage.getItem("history")) || [];
let players = JSON.parse(localStorage.getItem("currentGame")) || [];

// 🔥 RECUPERAR DATOS VIEJOS
let oldGame = JSON.parse(localStorage.getItem("game"));
if (oldGame && history.length === 0) {
  history.push({ date: "Recuperado", data: oldGame });
  localStorage.setItem("history", JSON.stringify(history));
}

// 🔥 SI NO HAY currentGame
if (players.length === 0 && history.length > 0) {
  players = JSON.parse(JSON.stringify(history[history.length - 1].data));
}

// 🔧 CREAR JUGADORES
function createPlayers(){
  let container=document.getElementById("players");
  container.innerHTML="";

  if(players.length===0){
    for(let i=0;i<9;i++){
      players.push({name:"",ab:0,h:0,hr:0});
    }
  }

  players.forEach((p,i)=>{
    let div=document.createElement("div");
    div.className="player";

    div.innerHTML=`
      <input value="${p.name}" placeholder="Jugador ${i+1}" onchange="updateName(${i},this.value)">
      <div id="stats${i}"></div>
      <div class="row">
        <button class="out" onclick="update(${i},'out')">OUT</button>
        <button class="hit" onclick="update(${i},'hit')">HIT</button>
        <button class="hr" onclick="update(${i},'hr')">HR</button>
      </div>
    `;
    container.appendChild(div);
  });

  render();
  updateLeaders();
}

function updateName(i,value){
  players[i].name=value;
  saveCurrent();
  updateLeaders();
}

function update(i,type){
  players[i].ab++;
  if(type==="hit") players[i].h++;
  if(type==="hr"){players[i].h++;players[i].hr++;}
  render();
  saveCurrent();
  updateLeaders();
}

function render(){
  players.forEach((p,i)=>{
    let avg=p.ab?(p.h/p.ab).toFixed(3):"0.000";
    document.getElementById("stats"+i).innerText=
      `#${i+1} | AB:${p.ab} H:${p.h} HR:${p.hr} AVG:${avg}`;
  });
}

function saveCurrent(){
  localStorage.setItem("currentGame", JSON.stringify(players));
}

// 🔥 GUARDAR DIA
function saveDay(){
  history.push({
    date:new Date().toLocaleDateString(),
    data: JSON.parse(JSON.stringify(players))
  });
  localStorage.setItem("history", JSON.stringify(history));
  updateLeaders();
  alert("Día guardado");
}

// 🔥 HISTORIAL
function showHistory(){
  let output="<div class='card'><h3>Historial</h3>";

  history.forEach((day,index)=>{
    output+=`
    <div class="card">
      <h4>Día #${index+1} - ${day.date}</h4>
      <table>
        <tr>
          <th>#</th><th>Jugador</th><th>AB</th><th>H</th><th>HR</th><th>AVG</th>
        </tr>
    `;

    day.data.forEach((p,i)=>{
      let avg=p.ab?(p.h/p.ab).toFixed(3):"0.000";
      output+=`
        <tr>
          <td>${i+1}</td>
          <td>${p.name||"Jugador"}</td>
          <td>${p.ab}</td>
          <td>${p.h}</td>
          <td>${p.hr}</td>
          <td>${avg}</td>
        </tr>
      `;
    });

    output+="</table></div>";
  });

  output+="</div>";
  document.getElementById("output").innerHTML=output;
}

// 🔥 RANKING
function ranking(){
  let total={};

  history.forEach(day=>{
    day.data.forEach(p=>{
      if(!p.name) return;
      if(!total[p.name]) total[p.name]={ab:0,h:0,hr:0};
      total[p.name].ab+=p.ab;
      total[p.name].h+=p.h;
      total[p.name].hr+=p.hr;
    });
  });

  let arr=Object.entries(total).map(([name,stats])=>{
    return {name,...stats,avg: stats.ab?(stats.h/stats.ab).toFixed(3):"0.000"}
  });

  arr.sort((a,b)=>b.avg-a.avg);

  let output="<div class='card'><h3>Ranking</h3><table>";
  output+="<tr><th>#</th><th>Jugador</th><th>AVG</th><th>HR</th></tr>";

  arr.forEach((p,i)=>{
    output+=`<tr>
      <td>${i+1}</td>
      <td>${p.name}</td>
      <td>${p.avg}</td>
      <td>${p.hr}</td>
    </tr>`;
  });

  output+="</table></div>";
  document.getElementById("output").innerHTML=output;
}

// 🔥 LIDERES
function updateLeaders(){
  let total={};

  history.forEach(day=>{
    day.data.forEach(p=>{
      if(!p.name) return;
      if(!total[p.name]) total[p.name]={ab:0,h:0,hr:0};
      total[p.name].ab+=p.ab;
      total[p.name].h+=p.h;
      total[p.name].hr+=p.hr;
    });
  });

  players.forEach(p=>{
    if(!p.name) return;
    if(!total[p.name]) total[p.name]={ab:0,h:0,hr:0};
    total[p.name].ab+=p.ab;
    total[p.name].h+=p.h;
    total[p.name].hr+=p.hr;
  });

  let arr=Object.entries(total).map(([name,stats])=>{
    return {name,avg: stats.ab?(stats.h/stats.ab).toFixed(3):"0.000",hr: stats.hr}
  });

  if(arr.length===0){
    document.getElementById("leaders").innerHTML="<h3>🔥 Líderes</h3><p>No hay datos</p>";
    return;
  }

  let bestAvg=[...arr].sort((a,b)=>b.avg-a.avg)[0];
  let bestHR=[...arr].sort((a,b)=>b.hr-a.hr)[0];

  document.getElementById("leaders").innerHTML=`
    <h3>🔥 Líderes</h3>
    <p>AVG: ${bestAvg.name} (${bestAvg.avg})</p>
    <p>HR: ${bestHR.name} (${bestHR.hr})</p>
  `;
}

// 🔥 RESET
function newSeason(){
  if(confirm("Borrar TODO?")){
    localStorage.clear();
    location.reload();
  }
}

// 🔥 INSTALAR APP
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt=e;
});

function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt=null;
  }else{
    alert("Instalación no disponible aún");
  }
}

// 🔥 SERVICE WORKER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

createPlayers();

</script>

</body>
</html>
