<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estadísticas Softball</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e2b3a">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e2b3a, #24384f);
  color: white;
  text-align: center;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  background: #4da3ff;
  color: white;
}

.card {
  background: #2e3f55;
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
  position: relative;
}

.deleteBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

input {
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin: 5px;
  width: 80%;
}

.out { background:red; }
.hit { background:#888; }
.hr { background:green; }
.bb { background:#f1c40f; color:black; }

.nombreJugador {
  font-size: 26px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>⚾ Estadísticas Softball</h1>

<div id="login">
  <input id="emailInput" placeholder="Correo"><br>
  <input id="passInput" type="password" placeholder="Contraseña"><br>

  <button onclick="login()">Entrar</button>
  <button onclick="crearCuenta()">Crear cuenta</button>
  <button onclick="invitado()">Invitado</button>
</div>

<div id="equipos" style="display:none;">
  <h2>Equipos</h2>
  <button onclick="crearEquipo()">+ Crear equipo</button>
  <button onclick="rankingGlobal()">🏆 Ranking Global</button>
  <div id="listaEquipos"></div>
</div>

<div id="app" style="display:none;">
  <h2 id="teamName"></h2>

  <button onclick="agregarJugador()">+ Jugador</button><br>

  <button onclick="guardarDia()">Guardar día</button>
  <button onclick="verHistorial()">Historial</button>
  <button onclick="verRanking()">AVG</button>
  <button onclick="rankingHR()">HR 🔥</button>
  <button onclick="nuevaTemp()">Nueva temporada</button>
  <button onclick="salir()">Salir</button>

  <div id="jugadores"></div>

  <button onclick="borrarHistorial()">🧹 Borrar historial</button>
</div>

<script>
let usuario = null;
let passActual = null;
let equipoActual = null;
let jugadores = [];
let historial = [];

/* LOGIN */
function login(){
  let e = emailInput.value;
  let p = passInput.value;
  if(!e || !p) return alert("Llena todo");

  usuario = e;
  passActual = p;
  setTimeout(()=>entrarEquipos(),100);
}

function crearCuenta(){
  let e = emailInput.value;
  let p = passInput.value;
  if(!e || !p) return alert("Llena todo");

  usuario = e;
  passActual = p;
  alert("Cuenta creada");
  setTimeout(()=>entrarEquipos(),100);
}

function invitado(){
  usuario = "invitado";
  passActual = null;
  setTimeout(()=>entrarEquipos(),100);
}

/* EQUIPOS */
function entrarEquipos(){
  login.style.display="none";
  equipos.style.display="block";
  renderEquipos();
}

function crearEquipo(){
  if(usuario==="invitado") return alert("Invitado no puede crear");

  let nombre = prompt("Nombre equipo");
  if(!nombre) return;

  let equipos = JSON.parse(localStorage.getItem("equipos"))||[];

  equipos.push({
    nombre,
    jugadores:[],
    historial:[],
    owner:usuario,
    pass:passActual
  });

  localStorage.setItem("equipos",JSON.stringify(equipos));
  renderEquipos();
}

function renderEquipos(){
  let equipos = JSON.parse(localStorage.getItem("equipos"))||[];
  listaEquipos.innerHTML="";

  equipos.forEach((e,i)=>{
    listaEquipos.innerHTML+=`
    <div class="card">
      ${e.nombre}<br>
      <button onclick="entrarEquipo(${i})">Entrar</button>
      <button onclick="eliminarEquipo(${i})">❌</button>
    </div>`;
  });
}

function eliminarEquipo(i){
  let equipos = JSON.parse(localStorage.getItem("equipos"));

  if(usuario!=="ortelio.garciaulloa@gmail.com" || passActual!=="AyO*9211"){
    return alert("No tienes permiso");
  }

  equipos.splice(i,1);
  localStorage.setItem("equipos",JSON.stringify(equipos));
  renderEquipos();
}

function entrarEquipo(i){
  let equipos = JSON.parse(localStorage.getItem("equipos"));
  let eq = equipos[i];

  if(
    eq.owner !== usuario &&
    !(usuario==="ortelio.garciaulloa@gmail.com" && passActual==="AyO*9211")
  ){
    return alert("No puedes entrar");
  }

  equipoActual=i;
  jugadores=eq.jugadores||[];
  historial=eq.historial||[];

  equipos.style.display="none";
  app.style.display="block";

  teamName.innerText=eq.nombre;
  renderJugadores();
}

function guardarEquipo(){
  let equipos = JSON.parse(localStorage.getItem("equipos"));
  equipos[equipoActual].jugadores=jugadores;
  equipos[equipoActual].historial=historial;
  localStorage.setItem("equipos",JSON.stringify(equipos));
}

/* JUGADORES */
function agregarJugador(){
  let n=prompt("Nombre jugador");
  if(!n) return;

  jugadores.push({
    nombre:n,
    AB:0,H:0,HR:0,BB:0,
    dia:{AB:0,H:0,HR:0,BB:0}
  });

  guardarEquipo();
  renderJugadores();
}

function eliminarJugador(i){
  let equipos = JSON.parse(localStorage.getItem("equipos"));
  let eq = equipos[equipoActual];

  if(
    eq.owner !== usuario &&
    !(usuario==="ortelio.garciaulloa@gmail.com" && passActual==="AyO*9211")
  ){
    return alert("No puedes borrar jugadores");
  }

  jugadores.splice(i,1);
  guardarEquipo();
  renderJugadores();
}

function renderJugadores(){
  jugadoresDiv = document.getElementById("jugadores");
  jugadoresDiv.innerHTML="";

  jugadores.forEach((j,i)=>{

    if(!j.dia){
      j.dia={AB:0,H:0,HR:0,BB:0};
    }

    let avg = j.AB ? (j.H/j.AB).toFixed(3) : 0;
    let bb = j.BB || 0;

    jugadoresDiv.innerHTML+=`
    <div class="card">
      <button class="deleteBtn" onclick="eliminarJugador(${i})">X</button>

      <div class="nombreJugador">${j.nombre}</div>

      AB:${j.AB} H:${j.H} HR:${j.HR} BB:${bb} AVG:${avg}<br>

      <button class="out" onclick="out(${i})">OUT</button>
      <button class="hit" onclick="hit(${i})">HIT</button>
      <button class="hr" onclick="hr(${i})">HR</button>
      <button class="bb" onclick="bb(${i})">BB</button>
    </div>`;
  });
}

/* ACCIONES */
function out(i){
  jugadores[i].AB++;
  jugadores[i].dia.AB++;
  guardarEquipo();
  renderJugadores();
}

function hit(i){
  jugadores[i].AB++;
  jugadores[i].H++;
  jugadores[i].dia.AB++;
  jugadores[i].dia.H++;
  guardarEquipo();
  renderJugadores();
}

function hr(i){
  jugadores[i].AB++;
  jugadores[i].H++;
  jugadores[i].HR++;
  jugadores[i].dia.AB++;
  jugadores[i].dia.H++;
  jugadores[i].dia.HR++;
  guardarEquipo();
  renderJugadores();
}

function bb(i){
  if(!jugadores[i].BB) jugadores[i].BB = 0;
  jugadores[i].BB++;

  jugadores[i].dia.BB++;

  guardarEquipo();
  renderJugadores();
}

/* HISTORIAL */
function guardarDia(){

  let fecha = new Date().toLocaleDateString();

  let resumen = {
    fecha,
    jugadores: jugadores.map(j=>({
      nombre:j.nombre,
      AB:j.dia.AB,
      H:j.dia.H,
      HR:j.dia.HR,
      BB:j.dia.BB
    }))
  };

  historial.push(resumen);

  jugadores.forEach(j=>{
    j.dia={AB:0,H:0,HR:0,BB:0};
  });

  guardarEquipo();
  alert("Día guardado correctamente");
}

function verHistorial(){
  if(historial.length==0) return alert("No hay historial");

  let txt="📅 HISTORIAL\n\n";

  historial.forEach(d=>{
    txt+=d.fecha+"\n";
    d.jugadores.forEach(j=>{
      txt+=`${j.nombre} → H:${j.H} HR:${j.HR} BB:${j.BB}\n`;
    });
    txt+="\n";
  });

  alert(txt);
}

function borrarHistorial(){
  historial=[];
  guardarEquipo();
  alert("Historial borrado");
}

/* RANKINGS */
function verRanking(){
  let lista=[...jugadores];

  lista.sort((a,b)=>{
    let A=a.AB?a.H/a.AB:0;
    let B=b.AB?b.H/b.AB:0;
    return B-A;
  });

  let txt="AVG TOTAL:\n";

  lista.forEach((j,i)=>{
    let avg=j.AB?(j.H/j.AB).toFixed(3):0;
    txt+=(i+1)+". "+j.nombre+" ("+avg+")\n";
  });

  alert(txt);
}

function rankingHR(){
  let lista=[...jugadores];

  lista.sort((a,b)=>b.HR-a.HR);

  let txt="HR TOTAL:\n";

  lista.forEach((j,i)=>{
    txt+=(i+1)+". "+j.nombre+" ("+j.HR+")\n";
  });

  alert(txt);
}

function rankingGlobal(){
  let equipos = JSON.parse(localStorage.getItem("equipos"))||[];
  let todos=[];

  equipos.forEach(e=> e.jugadores.forEach(j=>todos.push(j)));

  todos.sort((a,b)=> (b.H/b.AB||0)-(a.H/a.AB||0));

  let txt="GLOBAL:\n";
  todos.forEach((j,i)=> txt+=(i+1)+". "+j.nombre+"\n");

  alert(txt);
}

/* PWA */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

/* OTROS */
function nuevaTemp(){
  jugadores.forEach(j=>{
    j.AB=0;j.H=0;j.HR=0;j.BB=0;
    j.dia={AB:0,H:0,HR:0,BB:0};
  });
  guardarEquipo();
  renderJugadores();
}

function salir(){ location.reload(); }
</script>

</body>
</html>
