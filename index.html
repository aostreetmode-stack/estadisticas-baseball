<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas Baseball</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:10px;
}

h1{
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.botones{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
}

.hit{background:green;}
.out{background:red;}
.hr{background:orange;}

.reset{background:#ccc;color:black;margin-top:10px;}

.tabla{
  margin-top:15px;
}

.player{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
}

.top1{background:#FFD700;color:black;}
.top2{background:#C0C0C0;color:black;}
.top3{background:#cd7f32;color:black;}
</style>
</head>

<body>

<h1>⚾ Estadísticas</h1>
<h3 id="lider">💣 HR líder: ---</h3>

<input id="nombre" placeholder="Nombre del jugador">

<div class="botones">
  <button class="hit" onclick="registrar('hit')">Hit</button>
  <button class="out" onclick="registrar('out')">Out</button>
  <button class="hr" onclick="registrar('hr')">HR</button>
</div>

<button class="reset" onclick="resetear()">Nueva temporada</button>

<div class="tabla" id="tabla"></div>

<script>
let jugadores = JSON.parse(localStorage.getItem("jugadores")) || {};

function registrar(tipo){
  let nombre = document.getElementById("nombre").value.trim();
  if(nombre === "") return;

  if(!jugadores[nombre]){
    jugadores[nombre] = {hits:0, outs:0, hr:0};
  }

  if(tipo==="hit") jugadores[nombre].hits++;
  if(tipo==="out") jugadores[nombre].outs++;
  if(tipo==="hr"){
    jugadores[nombre].hits++;
    jugadores[nombre].hr++;
  }

  guardar();
  mostrar();
}

function guardar(){
  localStorage.setItem("jugadores", JSON.stringify(jugadores));
}

function mostrar(){
  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  let lista = Object.entries(jugadores);

  lista.sort((a,b)=>{
    let avgA = calcularAVG(a[1]);
    let avgB = calcularAVG(b[1]);
    return avgB - avgA;
  });

  let liderHR = "---";
  let maxHR = 0;

  lista.forEach(([nombre,stats],index)=>{
    let avg = calcularAVG(stats).toFixed(3);

    if(stats.hr > maxHR){
      maxHR = stats.hr;
      liderHR = nombre;
    }

    let div = document.createElement("div");
    div.className = "player";

    if(index===0) div.classList.add("top1");
    if(index===1) div.classList.add("top2");
    if(index===2) div.classList.add("top3");

    div.innerHTML = `
      <div>
        <strong>#${index+1} ${nombre}</strong><br>
        AVG: ${avg}
      </div>
      <div>
        H:${stats.hits} | HR:${stats.hr}
      </div>
    `;

    tabla.appendChild(div);
  });

  document.getElementById("lider").innerText = "💣 HR líder: " + liderHR;
}

function calcularAVG(stats){
  let turnos = stats.hits + stats.outs;
  if(turnos===0) return 0;
  return stats.hits / turnos;
}

function resetear(){
  if(confirm("¿Seguro quieres borrar la temporada?")){
    jugadores = {};
    guardar();
    mostrar();
  }
}

mostrar();
</script>

</body>
</html>
