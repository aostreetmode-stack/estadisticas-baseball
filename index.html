<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas Softball</title>

<style>
body{
 font-family: Arial;
 background:#1e2a38;
 color:white;
 text-align:center;
}

button{
 padding:10px;
 margin:5px;
 border:none;
 border-radius:10px;
}

input{
 padding:10px;
 margin:5px;
 border-radius:10px;
 border:none;
}

.card{
 background:#2f3e52;
 margin:10px;
 padding:10px;
 border-radius:10px;
}
</style>

</head>
<body>

<h1>⚾ Estadísticas Softball</h1>

<div id="login">
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<br>
<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
<button onclick="guest()">Invitado</button>
</div>

<div id="equipos" style="display:none">
<h2>Equipos</h2>

<button onclick="rankingGlobal()">🏆 Ranking Global</button>
<button onclick="crearEquipo()">+ Crear equipo</button>

<div id="listaEquipos"></div>
</div>

<div id="app" style="display:none">

<h2 id="nombreEquipo"></h2>

<button onclick="agregarJugador()">+ Agregar jugador</button>

<br>
<button onclick="guardarDia()">Guardar día</button>
<button onclick="verHistorial()">Historial</button>
<button onclick="verRanking()">Ranking</button>
<button onclick="nuevaTemp()">Nueva temporada</button>
<button onclick="cerrar()">Cerrar sesión</button>

<div id="jugadores"></div>

</div>

<button onclick="instalarApp()">📲 Instalar App</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
 getFirestore, collection, addDoc, getDocs,
 doc, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
 getAuth, signInWithEmailAndPassword,
 createUserWithEmailAndPassword,
 signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
 apiKey: "TU_API_KEY",
 authDomain: "TU_AUTH",
 projectId: "TU_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let teamId=null;

// LOGIN
window.login = async ()=>{
 let e=document.getElementById("email").value;
 let p=document.getElementById("password").value;
 await signInWithEmailAndPassword(auth,e,p);
 cargarEquipos();
};

window.register = async ()=>{
 let e=document.getElementById("email").value;
 let p=document.getElementById("password").value;
 await createUserWithEmailAndPassword(auth,e,p);
 cargarEquipos();
};

window.guest = async ()=>{
 await signInAnonymously(auth);
 cargarEquipos();
};

// EQUIPOS
async function cargarEquipos(){
 document.getElementById("login").style.display="none";
 document.getElementById("equipos").style.display="block";

 const cont=document.getElementById("listaEquipos");
 cont.innerHTML="";

 const snap=await getDocs(collection(db,"equipos"));

 snap.forEach(d=>{
  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
  ${d.data().nombre}
  <br>
  <button onclick="entrarEquipo('${d.id}','${d.data().nombre}')">Entrar</button>
  <button onclick="eliminarEquipo('${d.id}')">❌ Eliminar</button>
  `;

  cont.appendChild(div);
 });
}

window.crearEquipo = async ()=>{
 let nombre=prompt("Nombre equipo");
 if(!nombre)return;

 await addDoc(collection(db,"equipos"),{nombre});
 cargarEquipos();
};

window.eliminarEquipo = async(id)=>{
 await deleteDoc(doc(db,"equipos",id));
 cargarEquipos();
};

window.entrarEquipo = (id,nombre)=>{
 teamId=id;

 document.getElementById("equipos").style.display="none";
 document.getElementById("app").style.display="block";

 document.getElementById("nombreEquipo").innerText=nombre;

 cargarJugadores();
};

// JUGADORES
async function cargarJugadores(){
 const cont=document.getElementById("jugadores");
 cont.innerHTML="";

 const snap=await getDocs(collection(db,"equipos",teamId,"jugadores"));

 snap.forEach(d=>{
  const p=d.data();

  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
  ${p.nombre}
  <br>
  AB:${p.ab} H:${p.h} HR:${p.hr}
  <br>
  <button onclick="out('${d.id}',${p.ab},${p.h},${p.hr})">OUT</button>
  <button onclick="hit('${d.id}',${p.ab},${p.h},${p.hr})">HIT</button>
  <button onclick="hr('${d.id}',${p.ab},${p.h},${p.hr})">HR</button>
  <button onclick="borrarJugador('${d.id}')">X</button>
  `;

  cont.appendChild(div);
 });
}

window.agregarJugador = async ()=>{
 let nombre=prompt("Nombre");
 if(!nombre)return;

 await addDoc(collection(db,"equipos",teamId,"jugadores"),{
  nombre,ab:0,h:0,hr:0
 });

 cargarJugadores();
};

window.borrarJugador = async(id)=>{
 await deleteDoc(doc(db,"equipos",teamId,"jugadores",id));
 cargarJugadores();
};

window.out = async(id,ab,h,hr)=>{
 await updateDoc(doc(db,"equipos",teamId,"jugadores",id),{
  ab:ab+1
 });
 cargarJugadores();
};

window.hit = async(id,ab,h,hr)=>{
 await updateDoc(doc(db,"equipos",teamId,"jugadores",id),{
  ab:ab+1,h:h+1
 });
 cargarJugadores();
};

window.hr = async(id,ab,h,hr)=>{
 await updateDoc(doc(db,"equipos",teamId,"jugadores",id),{
  ab:ab+1,h:h+1,hr:hr+1
 });
 cargarJugadores();
};

// GUARDAR DIA
window.guardarDia = async ()=>{
 const snap=await getDocs(collection(db,"equipos",teamId,"jugadores"));

 let jugadores=[];

 snap.forEach(d=>{
  jugadores.push(d.data());
 });

 await addDoc(collection(db,"equipos",teamId,"historial"),{
  fecha:new Date().toLocaleString(),
  jugadores
 });

 alert("Guardado 🔥");
};

// HISTORIAL REAL
window.verHistorial = async ()=>{
 const snap=await getDocs(collection(db,"equipos",teamId,"historial"));

 let texto="📅 HISTORIAL\n\n";

 snap.forEach(d=>{
  let dia=d.data();

  texto+=dia.fecha+"\n";

  dia.jugadores.forEach(p=>{
   texto+=`${p.nombre} H:${p.h} HR:${p.hr}\n`;
  });

  texto+="----------------\n";
 });

 alert(texto);
};

// RANKING EQUIPO
window.verRanking = async ()=>{
 const snap=await getDocs(collection(db,"equipos",teamId,"jugadores"));

 let arr=[];

 snap.forEach(d=>{
  let p=d.data();
  let avg=p.ab>0?(p.h/p.ab):0;
  arr.push({nombre:p.nombre,avg});
 });

 arr.sort((a,b)=>b.avg-a.avg);

 let texto="🏆 Ranking\n\n";

 arr.forEach((j,i)=>{
  texto+=`${i+1}. ${j.nombre} ${j.avg.toFixed(3)}\n`;
 });

 alert(texto);
};

// GLOBAL
window.rankingGlobal = async ()=>{
 const equipos=await getDocs(collection(db,"equipos"));

 let arr=[];

 for(const e of equipos.docs){
  const jugadores=await getDocs(collection(db,"equipos",e.id,"jugadores"));

  jugadores.forEach(j=>{
   let p=j.data();
   let avg=p.ab>0?(p.h/p.ab):0;

   arr.push({nombre:p.nombre,avg});
  });
 }

 arr.sort((a,b)=>b.avg-a.avg);

 let texto="🌎 GLOBAL\n\n";

 arr.slice(0,10).forEach((j,i)=>{
  texto+=`${i+1}. ${j.nombre} ${j.avg.toFixed(3)}\n`;
 });

 alert(texto);
};

window.nuevaTemp = async ()=>{
 const snap=await getDocs(collection(db,"equipos",teamId,"jugadores"));

 snap.forEach(async d=>{
  await updateDoc(doc(db,"equipos",teamId,"jugadores",d.id),{
   ab:0,h:0,hr:0
  });
 });

 cargarJugadores();
};

window.cerrar = ()=>{
 location.reload();
};

// PWA
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
 e.preventDefault();
 deferredPrompt=e;
});

window.instalarApp = ()=>{
 if(deferredPrompt){
  deferredPrompt.prompt();
 }
};

</script>
</body>
</html>
