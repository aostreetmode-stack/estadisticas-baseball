<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softball Stats</title>

<style>
body {
  font-family: Arial;
  background: #1e2a38;
  color: white;
  margin: 0;
  padding: 10px;
}

h1 {
  text-align: center;
}

.top {
  text-align: center;
  margin-bottom: 10px;
}

.leaders {
  background: #2f3e52;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  text-align: center;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px;
  font-weight: bold;
}

.container {
  max-width: 500px;
  margin: auto;
}

.player {
  background: #2f3e52;
  padding: 12px;
  margin: 10px 0;
  border-radius: 15px;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* 🔥 BLOQUEADO */
.locked {
  background: #eaeaea;
  color: black;
  font-weight: bold;
}

.btn-out { background: red; color: white; }
.btn-hit { background: #dcdcdc; }
.btn-hr { background: green; color: white; }

.row {
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">

<h1>⚾ Estadísticas Softball</h1>

<div class="leaders" id="leaders"></div>

<div class="top">
  <button onclick="agregarJugador()">➕ Agregar jugador</button><br>
  <button onclick="guardarDia()">Guardar día</button>
  <button onclick="verHistorial()">Historial</button>
  <button onclick="verRanking()">Ranking</button><br>
  <button onclick="nuevaTemporada()">Nueva temporada</button>
</div>

<div id="players"></div>

</div>

<script>

let jugadores = JSON.parse(localStorage.getItem("jugadores")) || [];
let historial = JSON.parse(localStorage.getItem("historial")) || [];

if (jugadores.length === 0) {
  for (let i = 0; i < 12; i++) {
    jugadores.push(crearJugador());
  }
}

function crearJugador() {
  return {
    nombre: "",
    AB: 0,
    H: 0,
    HR: 0,
    locked: false
  };
}

function guardar() {
  localStorage.setItem("jugadores", JSON.stringify(jugadores));
}

/* 🔥 LÍDERES */
function calcularLideres() {
  let conNombre = jugadores.filter(j => j.nombre);

  if (conNombre.length === 0) {
    document.getElementById("leaders").innerHTML = "Sin datos";
    return;
  }

  let avgLider = [...conNombre].sort((a,b)=>(b.H/b.AB||0)-(a.H/a.AB||0))[0];
  let hrLider = [...conNombre].sort((a,b)=>b.HR-a.HR)[0];

  document.getElementById("leaders").innerHTML = `
    🏆 AVG líder: ${avgLider.nombre} (${avgLider.AB ? (avgLider.H/avgLider.AB).toFixed(3) : "0.000"})<br>
    💣 HR líder: ${hrLider.nombre} (${hrLider.HR})
  `;
}

function render() {
  const div = document.getElementById("players");
  div.innerHTML = "";

  calcularLideres();

  jugadores.forEach((j, i) => {
    let avg = j.AB ? (j.H / j.AB).toFixed(3) : "0.000";

    div.innerHTML += `
      <div class="player">
        <input 
          value="${j.nombre}" 
          ${j.locked ? "disabled class='locked'" : ""}
          onchange="bloquear(${i}, this.value)"
        >
        <button onclick="eliminar(${i})">X</button>

        <p>#${i+1} | AB:${j.AB} H:${j.H} HR:${j.HR} AVG:${avg}</p>

        <div class="row">
          <button class="btn-out" onclick="out(${i})">OUT</button>
          <button class="btn-hit" onclick="hit(${i})">HIT</button>
          <button class="btn-hr" onclick="hr(${i})">HR</button>
        </div>
      </div>
    `;
  });
}

window.bloquear = (i, nombre) => {
  if (!nombre.trim()) return;
  jugadores[i].nombre = nombre;
  jugadores[i].locked = true;
  guardar();
  render();
};

window.eliminar = (i) => {
  jugadores.splice(i, 1);
  guardar();
  render();
};

window.out = (i) => {
  jugadores[i].AB++;
  guardar();
  render();
};

window.hit = (i) => {
  jugadores[i].AB++;
  jugadores[i].H++;
  guardar();
  render();
};

window.hr = (i) => {
  jugadores[i].AB++;
  jugadores[i].H++;
  jugadores[i].HR++;
  guardar();
  render();
};

window.agregarJugador = () => {
  if (jugadores.length >= 16) return alert("Máximo 16");
  jugadores.push(crearJugador());
  guardar();
  render();
};

window.nuevaTemporada = () => {
  jugadores.forEach(j => {
    j.AB = 0;
    j.H = 0;
    j.HR = 0;
  });
  guardar();
  render();
};

window.guardarDia = () => {
  let fecha = new Date().toLocaleString();
  let data = jugadores.map(j =>
    `${j.nombre} H:${j.H} HR:${j.HR}`
  ).join("\n");

  historial.push(fecha + "\n" + data);
  localStorage.setItem("historial", JSON.stringify(historial));
  alert("Guardado");
};

window.verHistorial = () => {
  alert(historial.join("\n\n"));
};

window.verRanking = () => {
  let ranking = [...jugadores]
    .filter(j => j.nombre)
    .sort((a,b)=>(b.H/b.AB||0)-(a.H/a.AB||0));

  let texto = ranking.map((j,i)=>{
    let avg = j.AB ? (j.H/j.AB).toFixed(3) : "0.000";
    return `${i+1}. ${j.nombre} AVG:${avg}`;
  }).join("\n");

  alert(texto || "Sin datos");
};

render();

</script>

</body>
</html>
