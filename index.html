<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Softball Stats Pro</title>

<style>
body {
  font-family: Arial;
  background:#1f2c3a;
  color:white;
  text-align:center;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.admin-only { background:#2563eb; color:white; }
.guest { background:#6b7280; color:white; }

.player {
  background:#2f3e52;
  margin:10px;
  padding:10px;
  border-radius:15px;
}

.card {
  background:#2f3e52;
  margin:10px;
  padding:10px;
  border-radius:15px;
}

input {
  padding:8px;
  border-radius:10px;
  border:none;
  width:60%;
}

.out { background:red; }
.hit { background:gray; }
.hr { background:green; }
</style>
</head>

<body>

<h1>⚾ Estadísticas Softball</h1>

<!-- LOGIN -->
<div id="login">
  <input id="email" placeholder="Correo"><br><br>
  <input id="password" type="password" placeholder="Contraseña"><br><br>
  
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Crear cuenta</button>
  <button onclick="guestLogin()">Invitado</button>
</div>

<!-- EQUIPOS -->
<div id="teams" style="display:none;">
  <h2>Equipos</h2>
  <button onclick="crearEquipo()">➕ Crear equipo</button>
  <div id="listaEquipos"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <button class="admin-only" onclick="addPlayer()">+ Agregar jugador</button>

  <div>
    <button onclick="saveDay()">Guardar día</button>
    <button onclick="showHistory()">Historial</button>
    <button onclick="showRanking()">Ranking</button>
    <button onclick="newSeason()">Nueva temporada</button>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <h3 id="leader"></h3>

  <div id="players"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
 getAuth, signInWithEmailAndPassword,
 createUserWithEmailAndPassword,
 signInAnonymously, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
 getFirestore, collection, addDoc,
 getDocs, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyCDF4CBmDYdhWWdML55_mh4x4wUpTp2-tg",
 authDomain: "softball-stats-44e46.firebaseapp.com",
 projectId: "softball-stats-44e46",
 storageBucket: "softball-stats-44e46.appspot.com",
 messagingSenderId: "239247616602",
 appId: "1:239247616602:web:5606cc1c8d25f9d20c663"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user = null;
let isAdminGlobal = false;
let isAdminTeam = false;
let teamId = null;

// LOGIN STATE
onAuthStateChanged(auth, async (u)=>{
 if(!u) return;

 user = u;

 document.getElementById("login").style.display="none";
 document.getElementById("teams").style.display="block";

 isAdminGlobal = (user.email === "ortelio.garciaulloa@gmail.com");

 loadEquipos();
});

// AUTH
window.login = async ()=>{
 try{
   await signInWithEmailAndPassword(auth,email.value,password.value);
 }catch(e){
   alert(e.message);
 }
};

window.register = async ()=>{
 try{
   if(!email.value) return alert("Escribe un correo");
   if(password.value.length < 6) return alert("Mínimo 6 caracteres");

   await createUserWithEmailAndPassword(auth,email.value,password.value);
 }catch(e){
   alert(e.message);
 }
};

window.guestLogin = ()=>signInAnonymously(auth);

window.logout = ()=>{
 signOut(auth);
 location.reload();
}

// ---------------------
// EQUIPOS
// ---------------------

async function loadEquipos(){
 const snap = await getDocs(collection(db,"equipos"));
 const cont = document.getElementById("listaEquipos");
 cont.innerHTML="";

 snap.forEach(d=>{
   const e = d.data();

   cont.innerHTML += `
   <div class="card">
     ${e.nombre}
     <br>
     <button onclick="entrarEquipo('${d.id}','${e.admin}')">Entrar</button>

     ${(isAdminGlobal || e.admin === user.email) 
       ? `<button onclick="eliminarEquipo('${d.id}')">❌ Eliminar</button>` 
       : ""}

   </div>`;
 });
}

window.crearEquipo = async ()=>{
 if(user.isAnonymous) return alert("Regístrate para crear equipos");

 const nombre = prompt("Nombre del equipo");
 if(!nombre) return;

 await addDoc(collection(db,"equipos"),{
   nombre,
   admin: user.email
 });

 loadEquipos();
};

// 🔥 ELIMINAR EQUIPO
window.eliminarEquipo = async (id)=>{
 if(!confirm("¿Eliminar equipo completo?")) return;

 const jugadoresSnap = await getDocs(collection(db,"equipos",id,"jugadores"));

 for(const j of jugadoresSnap.docs){
   await deleteDoc(doc(db,"equipos",id,"jugadores",j.id));
 }

 await deleteDoc(doc(db,"equipos",id));

 loadEquipos();
};

// ---------------------
// ENTRAR EQUIPO
// ---------------------

window.entrarEquipo = (id, adminEmail)=>{
 teamId = id;

 isAdminTeam = (user.email === adminEmail);

 document.getElementById("teams").style.display="none";
 document.getElementById("app").style.display="block";

 loadPlayers();
};

// ---------------------
// JUGADORES
// ---------------------

async function loadPlayers(){
 const snap = await getDocs(collection(db,"equipos",teamId,"jugadores"));
 const container = document.getElementById("players");
 container.innerHTML="";

 let topHR = 0;
 let leaderName = "";

 snap.forEach(docSnap=>{
   const p = docSnap.data();

   if(p.hr > topHR){
     topHR = p.hr;
     leaderName = p.nombre;
   }

   container.innerHTML += `
   <div class="player">
     <input value="${p.nombre}" readonly style="background:#d1d5db;color:black;">
     <p>AB:${p.ab} H:${p.h} HR:${p.hr}</p>

     <button class="out" onclick="update('${docSnap.id}','out')">OUT</button>
     <button class="hit" onclick="update('${docSnap.id}','hit')">HIT</button>
     <button class="hr" onclick="update('${docSnap.id}','hr')">HR</button>

     ${(isAdminTeam || isAdminGlobal) ? `<button onclick="removePlayer('${docSnap.id}')">X</button>`:""}
   </div>
   `;
 });

 document.getElementById("leader").innerText =
   "🔥 Líder HR: " + (leaderName || "Nadie") + " ("+topHR+")";
}

// ---------------------
// AGREGAR
// ---------------------

window.addPlayer = async ()=>{
 if(!(isAdminTeam || isAdminGlobal)) return alert("Solo admin");

 const name = prompt("Nombre jugador");
 if(!name) return;

 await addDoc(collection(db,"equipos",teamId,"jugadores"),{
   nombre:name, ab:0,h:0,hr:0
 });

 loadPlayers();
};

// ---------------------
// UPDATE
// ---------------------

window.update = async (id,type)=>{
 const ref = doc(db,"equipos",teamId,"jugadores",id);
 const snap = await getDocs(collection(db,"equipos",teamId,"jugadores"));

 let player;
 snap.forEach(d=>{
   if(d.id==id) player=d.data();
 });

 if(type=="out") player.ab++;
 if(type=="hit"){ player.h++; player.ab++; }
 if(type=="hr"){ player.hr++; player.h++; player.ab++; }

 await updateDoc(ref,player);
 loadPlayers();
};

// ---------------------
// ELIMINAR JUGADOR
// ---------------------

window.removePlayer = async (id)=>{
 if(!(isAdminTeam || isAdminGlobal)) return;
 await deleteDoc(doc(db,"equipos",teamId,"jugadores",id));
 loadPlayers();
};

// ---------------------
// NUEVA TEMPORADA
// ---------------------

window.newSeason = async ()=>{
 if(!(isAdminTeam || isAdminGlobal)) return;

 const snap = await getDocs(collection(db,"equipos",teamId,"jugadores"));

 snap.forEach(async d=>{
   await updateDoc(doc(db,"equipos",teamId,"jugadores",d.id),{
     ab:0,h:0,hr:0
   });
 });

 loadPlayers();
};

// ---------------------
// EXTRA
// ---------------------

window.saveDay = ()=>alert("Guardado 🔥");
window.showHistory = ()=>alert("Historial aún no activo");
window.showRanking = ()=>alert("Ranking 🔥");

</script>

</body>
</html>
