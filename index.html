<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estadísticas Baseball</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
}

.player{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-bottom:5px;
}

.botones{
  display:flex;
  gap:5px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.out{background:red;}
.hit{background:#ccc;}
.hr{background:green;}

.reset{
  margin-top:10px;
  background:#ccc;
  color:black;
  width:100%;
}
</style>
</head>

<body>

<div class="top">
  <div>🏆 AVG líder: <span id="liderAVG">---</span></div>
  <div>💣 HR líder: <span id="liderHR">---</span></div>
</div>

<div id="players"></div>

<button class="reset" onclick="resetear()">Nueva temporada</button>

<script>

let data = JSON.parse(localStorage.getItem("players")) ||
Array(16).fill().map(()=>({
  name:"Jugador",
  ab:0,
  hits:0,
  hr:0
}));

function render(){
  let container = document.getElementById("players");
  container.innerHTML = "";

  data.sort((a,b)=>{
    let avgA = a.ab ? a.hits/a.ab : 0;
    let avgB = b.ab ? b.hits/b.ab : 0;
    return avgB - avgA;
  });

  let liderAVG = data[0]?.name || "---";

  let liderHR = "---";
  let maxHR = 0;

  data.forEach(p=>{
    if(p.hr > maxHR){
      maxHR = p.hr;
      liderHR = p.name;
    }
  });

  document.getElementById("liderAVG").innerText = liderAVG;
  document.getElementById("liderHR").innerText = liderHR;

  data.forEach((p,i)=>{
    let avg = p.ab ? (p.hits/p.ab).toFixed(3) : "0.000";

    let div = document.createElement("div");
    div.className = "player";

    div.innerHTML = `
      <input value="${p.name}" onchange="cambiarNombre(${i},this.value)">
      <div>#${i+1} | AB:${p.ab} H:${p.hits} HR:${p.hr} AVG:${avg}</div>

      <div class="botones">
        <button class="out" onclick="add(${i},'out')">OUT</button>
        <button class="hit" onclick="add(${i},'hit')">HIT</button>
        <button class="hr" onclick="add(${i},'hr')">HR</button>
      </div>
    `;

    container.appendChild(div);
  });

  guardar();
}

function cambiarNombre(i,nombre){
  data[i].name = nombre;
  guardar();
}

function add(i,tipo){
  data[i].ab++;

  if(tipo==="hit") data[i].hits++;
  if(tipo==="hr"){
    data[i].hits++;
    data[i].hr++;
  }

  render();
}

function guardar(){
  localStorage.setItem("players", JSON.stringify(data));
}

function resetear(){
  if(confirm("¿Nueva temporada?")){
    localStorage.removeItem("players");
    location.reload();
  }
}

render();

</script>

</body>
</html>
