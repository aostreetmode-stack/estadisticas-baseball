<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Softball Stats Pro</title>

<style>
body {
  font-family: Arial;
  background:#1f2c3a;
  color:white;
  text-align:center;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.admin-only { background:#2563eb; color:white; }
.guest { background:#6b7280; color:white; }

.player {
  background:#2f3e52;
  margin:10px;
  padding:10px;
  border-radius:15px;
}

input {
  padding:8px;
  border-radius:10px;
  border:none;
  width:60%;
}

.out { background:red; }
.hit { background:gray; }
.hr { background:green; }

</style>
</head>

<body>

<h1>⚾ Estadísticas Softball</h1>

<div id="login">
  <input id="email" placeholder="Correo"><br><br>
  <input id="password" type="password" placeholder="Contraseña"><br><br>
  
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Crear cuenta</button>
  <button onclick="guestLogin()">Invitado</button>
</div>

<div id="app" style="display:none;">

  <button class="admin-only" onclick="addPlayer()">+ Agregar jugador</button>

  <div>
    <button class="admin-only" onclick="saveDay()">Guardar día</button>
    <button onclick="showRanking()">Ranking</button>
    <button class="admin-only" onclick="newSeason()">Nueva temporada</button>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <h3 id="leader"></h3>

  <div id="players"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
 getAuth, signInWithEmailAndPassword,
 createUserWithEmailAndPassword,
 signInAnonymously, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
 getFirestore, collection, addDoc,
 getDocs, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "TU_API_KEY",
 authDomain: "softball-stats-44e46.firebaseapp.com",
 projectId: "softball-stats-44e46",
 storageBucket: "softball-stats-44e46.appspot.com",
 messagingSenderId: "239247616602",
 appId: "1:239247616602:web:5606cc1c8d25f9d20c663"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let userId = null;
let isAdmin = false;

onAuthStateChanged(auth, async (user) => {
 if(user){
   userId = user.uid;
   isAdmin = !user.isAnonymous;

   document.getElementById("login").style.display="none";
   document.getElementById("app").style.display="block";

   loadPlayers();
 }
});

window.login = async ()=>{
 try{
   await signInWithEmailAndPassword(auth, email.value, password.value);
 }catch(e){ alert(e.message); }
}

window.register = async ()=>{
 try{
   await createUserWithEmailAndPassword(auth, email.value, password.value);
 }catch(e){ alert(e.message); }
}

window.guestLogin = async ()=>{
 await signInAnonymously(auth);
}

window.logout = ()=>{
 signOut(auth);
 location.reload();
}

async function loadPlayers(){
 const snapshot = await getDocs(collection(db,"users",userId,"players"));
 const container = document.getElementById("players");
 container.innerHTML="";

 let topHR = 0;
 let leaderName = "";

 snapshot.forEach(docSnap=>{
   const p = docSnap.data();

   if(p.hr > topHR){
     topHR = p.hr;
     leaderName = p.name;
   }

   container.innerHTML += `
   <div class="player">
     <input value="${p.name}" readonly style="background:#d1d5db;color:black;">
     <p>AB:${p.ab} H:${p.h} HR:${p.hr}</p>

     <button class="out" onclick="update('${docSnap.id}','out')">OUT</button>
     <button class="hit" onclick="update('${docSnap.id}','hit')">HIT</button>
     <button class="hr" onclick="update('${docSnap.id}','hr')">HR</button>

     ${isAdmin ? `<button onclick="removePlayer('${docSnap.id}')">X</button>`:""}
   </div>
   `;
 });

 document.getElementById("leader").innerText =
   "🔥 Líder HR: " + (leaderName || "Nadie") + " ("+topHR+")";
}

window.addPlayer = async ()=>{
 if(!isAdmin) return alert("Solo admin");

 const name = prompt("Nombre jugador");
 if(!name) return;

 await addDoc(collection(db,"users",userId,"players"),{
   name, ab:0,h:0,hr:0
 });

 loadPlayers();
}

window.update = async (id,type)=>{
 const ref = doc(db,"users",userId,"players",id);
 const snap = await getDocs(collection(db,"users",userId,"players"));

 let player;
 snap.forEach(d=>{
   if(d.id==id) player=d.data();
 });

 if(type=="out") player.ab++;
 if(type=="hit"){ player.h++; player.ab++; }
 if(type=="hr"){ player.hr++; player.h++; player.ab++; }

 await updateDoc(ref,player);
 loadPlayers();
}

window.removePlayer = async (id)=>{
 if(!isAdmin) return;
 await deleteDoc(doc(db,"users",userId,"players",id));
 loadPlayers();
}

window.newSeason = async ()=>{
 if(!isAdmin) return;

 const snap = await getDocs(collection(db,"users",userId,"players"));

 snap.forEach(async d=>{
   await updateDoc(doc(db,"users",userId,"players",d.id),{
     ab:0,h:0,hr:0
   });
 });

 loadPlayers();
}

window.saveDay = ()=>{
 alert("Guardado en Firebase 🔥");
}

window.showRanking = ()=>{
 alert("Ranking activo 🔥");
}

</script>
</body>
</html>
