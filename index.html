<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-bottom:5px;
}

.stats{
  font-size:13px;
  margin-bottom:5px;
}

.botones{
  display:flex;
  gap:5px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
}

.out{background:red;}
.hit{background:gray;}
.hr{background:green;}

.reset{
  width:100%;
  margin-top:10px;
  background:#ccc;
  color:black;
}

</style>
</head>

<body>

<div class="top">
  <div>🏆 AVG líder: <span id="liderAVG">---</span></div>
  <div>💣 HR líder: <span id="liderHR">---</span></div>
</div>

<div id="players"></div>

<button onclick="guardarDia()">Guardar día</button>
<button onclick="verHistorial()">Historial</button>
<button class="reset" onclick="resetear()">Nueva temporada</button>

<script>

let data = JSON.parse(localStorage.getItem("players")) || 
Array(16).fill(0).map(()=>({name:"",ab:0,hits:0,hr:0}));

function render(){
  let container = document.getElementById("players");
  container.innerHTML="";

  // ordenar por AVG
  data.sort((a,b)=>{
    let avgA = a.ab ? a.hits/a.ab : 0;
    let avgB = b.ab ? b.hits/b.ab : 0;
    return avgB - avgA;
  });

  // líderes
  let liderAVG = data[0]?.name || "---";
  let liderHR = data.reduce((a,b)=> b.hr>a.hr?b:a).name || "---";

  document.getElementById("liderAVG").innerText = liderAVG;
  document.getElementById("liderHR").innerText = liderHR;

  data.forEach((p,i)=>{
    let avg = p.ab ? (p.hits/p.ab).toFixed(3) : "0.000";

    container.innerHTML += `
    <div class="card">
      <input value="${p.name}" placeholder="Jugador" onchange="setNombre(${i},this.value)">
      <div class="stats">
        #${i+1} | AB:${p.ab} H:${p.hits} HR:${p.hr} AVG:${avg}
      </div>

      <div class="botones">
        <button class="out" onclick="accion(${i},'out')">OUT</button>
        <button class="hit" onclick="accion(${i},'hit')">HIT</button>
        <button class="hr" onclick="accion(${i},'hr')">HR</button>
      </div>
    </div>
    `;
  });

  guardar();
}

function setNombre(i,val){
  data[i].name = val;
  guardar();
}

function accion(i,tipo){
  data[i].ab++;

  if(tipo==="hit") data[i].hits++;
  if(tipo==="hr"){
    data[i].hits++;
    data[i].hr++;
  }

  render();
}

function guardar(){
  localStorage.setItem("players",JSON.stringify(data));
}

function resetear(){
  if(confirm("¿Nueva temporada?")){
    localStorage.clear();
    location.reload();
  }
}

function guardarDia(){
  let historial = JSON.parse(localStorage.getItem("historial")) || [];

  historial.push({
    fecha: new Date().toLocaleString(),
    data: JSON.parse(JSON.stringify(data))
  });

  localStorage.setItem("historial",JSON.stringify(historial));

  alert("Día guardado 🔥");
}

function verHistorial(){
  let historial = JSON.parse(localStorage.getItem("historial")) || [];

  if(historial.length===0){
    alert("No hay historial");
    return;
  }

  let texto="";

  historial.forEach(dia=>{
    texto += "📅 "+dia.fecha+"\n";

    dia.data.forEach(p=>{
      let avg = p.ab ? (p.hits/p.ab).toFixed(3) : "0.000";
      texto += `${p.name||"Jugador"} | H:${p.hits} HR:${p.hr} AVG:${avg}\n`;
    });

    texto+="\n----------------\n";
  });

  alert(texto);
}

render();

</script>

</body>
</html>
