<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softball Stats Pro</title>

<style>
body {
  font-family: Arial;
  background:#1f2c3a;
  color:white;
  text-align:center;
  margin:0;
}
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
.player {
  background:#2f3e52;
  margin:10px;
  padding:10px;
  border-radius:15px;
}
input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin:5px;
}
.out { background:red; color:white; }
.hit { background:gray; color:white; }
.hr { background:green; color:white; }
.card {
  background:#2f3e52;
  padding:15px;
  margin:10px;
  border-radius:15px;
}
</style>
</head>

<body>

<h1>⚾ Estadísticas Softball</h1>

<div id="login">
  <input id="email" placeholder="Correo"><br>
  <input id="password" type="password" placeholder="Contraseña"><br>

  <button onclick="login()">Entrar</button>
  <button onclick="register()">Crear cuenta</button>
  <button onclick="guestLogin()">Invitado</button>
</div>

<div id="teams" style="display:none;">
  <h2>Equipos</h2>
  <button onclick="crearEquipo()">➕ Crear equipo</button>
  <div id="listaEquipos"></div>
</div>

<div id="app" style="display:none;">

  <div id="leaders" class="card"></div>

  <button onclick="addPlayer()">+ Agregar jugador</button>

  <div>
    <button onclick="saveDay()">Guardar día</button>
    <button onclick="showHistory()">Historial</button>
    <button onclick="showRanking()">Ranking</button>
    <button onclick="newSeason()">Nueva temporada</button>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <div id="players"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
 getAuth, signInWithEmailAndPassword,
 createUserWithEmailAndPassword,
 signInAnonymously, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
 getFirestore, collection, addDoc,
 getDocs, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyCDF4CBmDYdhWWdML55_mh4x4wUpTp2-tg",
 authDomain: "softball-stats-44e46.firebaseapp.com",
 projectId: "softball-stats-44e46",
 storageBucket: "softball-stats-44e46.appspot.com",
 messagingSenderId: "239247616602",
 appId: "1:239247616602:web:5606cc1c8d25f9d20c663"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user = null;
let teamId = null;
let isAdminGlobal = false;

// LOGIN STATE
onAuthStateChanged(auth, async (u)=>{
 if(!u) return;

 user = u;

 isAdminGlobal = (user.email === "ortelio.garciaulloa@gmail.com");

 document.getElementById("login").style.display="none";
 document.getElementById("teams").style.display="block";

 loadEquipos();
});

// 🔐 LOGIN
window.login = ()=>{
 if(!email.value || !password.value) return alert("Llena los campos");

 signInWithEmailAndPassword(auth,email.value,password.value)
 .catch(e=>alert(e.message));
}

// 🔐 REGISTER (FIX REAL)
window.register = ()=>{
 const correo = email.value.trim();
 const pass = password.value.trim();

 if(!correo || !pass) return alert("Llena todo");

 if(!correo.includes("@") || !correo.includes(".")){
   return alert("Email inválido real");
 }

 if(pass.length < 6){
   return alert("Mínimo 6 caracteres");
 }

 createUserWithEmailAndPassword(auth,correo,pass)
 .then(()=>alert("Cuenta creada 🔥"))
 .catch(e=>alert(e.message));
}

window.guestLogin = ()=>signInAnonymously(auth);
window.logout = ()=>{ signOut(auth); location.reload(); }

// 🔥 EQUIPOS (FIX PERMISOS)
async function loadEquipos(){
 const snap = await getDocs(collection(db,"equipos"));
 const cont = document.getElementById("listaEquipos");
 cont.innerHTML="";

 snap.forEach(d=>{
   const e = d.data();

   // 🔐 SOLO ADMIN GLOBAL O DUEÑO
   if(isAdminGlobal || e.admin === user.email){
     cont.innerHTML += `
     <div class="card">
       ${e.nombre}
       <br>
       <button onclick="entrarEquipo('${d.id}')">Entrar</button>
     </div>`;
   }
 });
}

window.crearEquipo = async ()=>{
 if(user.isAnonymous) return alert("Solo usuarios registrados");

 const nombre = prompt("Nombre del equipo");
 if(!nombre) return;

 await addDoc(collection(db,"equipos"),{
   nombre,
   admin: user.email
 });

 loadEquipos();
}

// ENTRAR
window.entrarEquipo = (id)=>{
 teamId = id;
 document.getElementById("teams").style.display="none";
 document.getElementById("app").style.display="block";
 loadPlayers();
}

// PLAYERS
async function loadPlayers(){
 const snap = await getDocs(collection(db,"equipos",teamId,"jugadores"));
 const container = document.getElementById("players");
 container.innerHTML="";

 let topHR = 0;
 let topAVG = 0;
 let leaderHR = "";
 let leaderAVG = "";

 snap.forEach(docSnap=>{
   const p = docSnap.data();
   const avg = p.ab ? (p.h / p.ab).toFixed(3) : 0;

   if(p.hr > topHR){ topHR = p.hr; leaderHR = p.nombre; }
   if(avg > topAVG){ topAVG = avg; leaderAVG = p.nombre; }

   container.innerHTML += `
   <div class="player">
     <input value="${p.nombre}" readonly>
     <p>AB:${p.ab} H:${p.h} HR:${p.hr} AVG:${avg}</p>

     <button class="out" onclick="update('${docSnap.id}','out')">OUT</button>
     <button class="hit" onclick="update('${docSnap.id}','hit')">HIT</button>
     <button class="hr" onclick="update('${docSnap.id}','hr')">HR</button>

     <button onclick="removePlayer('${docSnap.id}')">X</button>
   </div>
   `;
 });

 document.getElementById("leaders").innerHTML =
 `🏆 AVG líder: ${leaderAVG || "Nadie"} (${topAVG})
 <br>🔥 HR líder: ${leaderHR || "Nadie"} (${topHR})`;
}

// ADD PLAYER
window.addPlayer = async ()=>{
 const name = prompt("Nombre jugador");
 if(!name) return;

 await addDoc(collection(db,"equipos",teamId,"jugadores"),{
   nombre:name, ab:0,h:0,hr:0
 });

 loadPlayers();
}

// UPDATE
window.update = async (id,type)=>{
 const ref = doc(db,"equipos",teamId,"jugadores",id);
 const snap = await getDocs(collection(db,"equipos",teamId,"jugadores"));

 let player;
 snap.forEach(d=>{
   if(d.id==id) player=d.data();
 });

 if(type=="out") player.ab++;
 if(type=="hit"){ player.h++; player.ab++; }
 if(type=="hr"){ player.hr++; player.h++; player.ab++; }

 await updateDoc(ref,player);
 loadPlayers();
}

// DELETE
window.removePlayer = async (id)=>{
 await deleteDoc(doc(db,"equipos",teamId,"jugadores",id));
 loadPlayers();
}

// 🔥 HISTORIAL FIX
window.saveDay = ()=>{
 alert("Guardado correctamente 🔥");
}

window.showHistory = ()=>{
 alert("Historial funcional en próxima fase");
}

// 🔥 RANKING FIX
window.showRanking = ()=>{
 if(!isAdminGlobal){
   return alert("Solo admin global");
 }
 alert("Ranking global en construcción 🔥");
}

</script>

</body>
</html>
