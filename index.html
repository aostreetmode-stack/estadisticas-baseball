
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas CUB Thunder</title>

<style>
body{
  background:#0f172a;
    color:white;
      font-family:Arial, sans-serif;
        padding:10px;
        }

        /* HEADER */
        .top{
          display:flex;
            justify-content:space-between;
              font-size:18px;
                margin-bottom:10px;
                }

                /* INPUTS */
                input{
                  width:100%;
                    padding:10px;
                      margin:5px 0;
                        border-radius:8px;
                          border:none;
                            font-size:16px;
                            }

                            /* BOTONES */
                            .controls{
                              display:flex;
                                gap:5px;
                                  flex-wrap:wrap;
                                  }

                                  button{
                                    flex:1;
                                      padding:10px;
                                        border:none;
                                          border-radius:10px;
                                            background:#334155;
                                              color:white;
                                                font-weight:bold;
                                                }

                                                /* TARJETAS */
                                                .player{
                                                  background:#1e293b;
                                                    padding:10px;
                                                      border-radius:10px;
                                                        margin-top:8px;
                                                        }

                                                        .name{
                                                          font-size:18px;
                                                            font-weight:bold;
                                                            }

                                                            .stats{
                                                              font-size:14px;
                                                                margin-top:5px;
                                                                }
                                                                </style>
                                                                </head>

                                                                <body>

                                                                <h2>⚾ Estadísticas</h2>

                                                                <div class="top">
                                                                  <span id="lider">💣 HR líder: ---</span>
                                                                  </div>

                                                                  <input id="nombre" placeholder="Nombre del jugador">
                                                                  <input id="hits" type="number" placeholder="Hits">
                                                                  <input id="turnos" type="number" placeholder="Turnos">

                                                                  <div class="controls">
                                                                    <button onclick="agregar()">Guardar día</button>
                                                                      <button onclick="nuevaTemporada()">Nueva temporada</button>
                                                                        <button onclick="verHistorial()">Historial</button>
                                                                        </div>

                                                                        <div id="lista"></div>

                                                                        <script>
                                                                        let jugadores = JSON.parse(localStorage.getItem("jugadores")) || [];
                                                                        let historial = JSON.parse(localStorage.getItem("historial")) || [];

                                                                        function guardar(){
                                                                          localStorage.setItem("jugadores", JSON.stringify(jugadores));
                                                                            localStorage.setItem("historial", JSON.stringify(historial));
                                                                            }

                                                                            function agregar(){
                                                                              let nombre = document.getElementById("nombre").value;
                                                                                let hits = parseInt(document.getElementById("hits").value);
                                                                                  let turnos = parseInt(document.getElementById("turnos").value);

                                                                                    if(!nombre || isNaN(hits) || isNaN(turnos)) return;

                                                                                      let existente = jugadores.find(j => j.nombre === nombre);

                                                                                        if(existente){
                                                                                            existente.hits += hits;
                                                                                                existente.turnos += turnos;
                                                                                                  }else{
                                                                                                      jugadores.push({nombre, hits, turnos});
                                                                                                        }

                                                                                                          jugadores.forEach(j=>{
                                                                                                              j.promedio = Math.round((j.hits / j.turnos) * 1000);
                                                                                                                });

                                                                                                                  jugadores.sort((a,b)=>b.promedio - a.promedio);

                                                                                                                    guardar();
                                                                                                                      mostrar();
                                                                                                                      }

                                                                                                                      function mostrar(){
                                                                                                                        let lista = document.getElementById("lista");
                                                                                                                          lista.innerHTML = "";

                                                                                                                            jugadores.forEach((j,i)=>{
                                                                                                                                lista.innerHTML += `
                                                                                                                                      <div class="player">
                                                                                                                                              <div class="name">${i+1}. ${j.nombre}</div>
                                                                                                                                                      <div class="stats">
                                                                                                                                                                AVG: ${j.promedio} | H: ${j.hits} | AB: ${j.turnos}
                                                                                                                                                                        </div>
                                                                                                                                                                              </div>
                                                                                                                                                                                  `;
                                                                                                                                                                                    });
                                                                                                                                                                                    }

                                                                                                                                                                                    function nuevaTemporada(){
                                                                                                                                                                                      if(jugadores.length > 0){
                                                                                                                                                                                          historial.push({
                                                                                                                                                                                                fecha: new Date().toLocaleDateString(),
                                                                                                                                                                                                      datos: jugadores
                                                                                                                                                                                                          });
                                                                                                                                                                                                            }

                                                                                                                                                                                                              jugadores = [];
                                                                                                                                                                                                                guardar();
                                                                                                                                                                                                                  mostrar();
                                                                                                                                                                                                                  }

                                                                                                                                                                                                                  function verHistorial(){
                                                                                                                                                                                                                    let lista = document.getElementById("lista");
                                                                                                                                                                                                                      lista.innerHTML = "<h3>📅 Historial</h3>";

                                                                                                                                                                                                                        historial.forEach((h,i)=>{
                                                                                                                                                                                                                            lista.innerHTML += `
                                                                                                                                                                                                                                  <div class="player">
                                                                                                                                                                                                                                          <div class="name">Temporada ${i+1} (${h.fecha})</div>
                                                                                                                                                                                                                                                  <div class="stats">${h.datos.length} jugadores</div>
                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                            `;
                                                                                                                                                                                                                                                              });
                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                              mostrar();
                                                                                                                                                                                                                                                              </script>

                                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                                              </html>
