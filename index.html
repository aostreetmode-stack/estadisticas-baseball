<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Softball Stats Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {font-family:Arial;background:#1f2c3a;color:white;text-align:center;}
button{padding:10px;margin:5px;border:none;border-radius:10px;}
.player{background:#2f3e52;margin:10px;padding:10px;border-radius:10px;}
.card{background:#2f3e52;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h1>⚾ Softball Stats</h1>

<div id="login">
<input id="email" placeholder="Correo"><br>
<input id="password" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
<button onclick="guest()">Invitado</button>
</div>

<div id="equipos" style="display:none">
<h2>Equipos</h2>
<button onclick="rankingGlobal()">🏆 Ranking Global</button>
<button onclick="crearEquipo()">+ Crear equipo</button>
<div id="listaEquipos"></div>
</div>

<div id="app" style="display:none">
<h2 id="teamName"></h2>

<button onclick="addPlayer()">+ Jugador</button><br>
<button onclick="saveDay()">Guardar día</button>
<button onclick="showHistory()">Historial</button>
<button onclick="showRanking()">Ranking</button>
<button onclick="newSeason()">Nueva temporada</button>
<button onclick="logout()">Salir</button>

<div id="players"></div>
</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyCDF4CBmDYdhWWdML55_mh4x4wUpTp2-tg",
 authDomain: "softball-stats-44e46.firebaseapp.com",
 projectId: "softball-stats-44e46"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user, teamId;

// AUTH
function login(){
 auth.signInWithEmailAndPassword(email.value,password.value);
}

function register(){
 auth.createUserWithEmailAndPassword(email.value,password.value);
}

function guest(){
 auth.signInAnonymously();
}

function logout(){
 location.reload();
}

auth.onAuthStateChanged(u=>{
 if(!u) return;
 user=u;
 document.getElementById("login").style.display="none";
 document.getElementById("equipos").style.display="block";
 loadTeams();
});

// EQUIPOS
async function loadTeams(){
 const cont=document.getElementById("listaEquipos");
 cont.innerHTML="";

 const snap=await db.collection("equipos").get();

 snap.forEach(d=>{
  let e=d.data();

  cont.innerHTML+=`
  <div class="card">
  ${e.nombre}<br>
  <button onclick="enterTeam('${d.id}','${e.nombre}')">Entrar</button>
  <button onclick="deleteTeam('${d.id}')">❌</button>
  </div>`;
 });
}

async function crearEquipo(){
 let nombre=prompt("Nombre equipo");
 if(!nombre) return;

 await db.collection("equipos").add({nombre});
 loadTeams();
}

async function deleteTeam(id){
 if(!confirm("Eliminar equipo?")) return;
 await db.collection("equipos").doc(id).delete();
 loadTeams();
}

function enterTeam(id,name){
 teamId=id;
 document.getElementById("equipos").style.display="none";
 document.getElementById("app").style.display="block";
 document.getElementById("teamName").innerText=name;
 loadPlayers();
}

// JUGADORES
async function loadPlayers(){
 const cont=document.getElementById("players");
 cont.innerHTML="";

 const snap=await db.collection("equipos").doc(teamId).collection("jugadores").get();

 snap.forEach(d=>{
  let p=d.data();

  cont.innerHTML+=`
  <div class="player">
  ${p.nombre}<br>
  AB:${p.ab} H:${p.h} HR:${p.hr}<br>
  <button onclick="update('${d.id}','out')">OUT</button>
  <button onclick="update('${d.id}','hit')">HIT</button>
  <button onclick="update('${d.id}','hr')">HR</button>
  </div>`;
 });
}

async function addPlayer(){
 let name=prompt("Nombre");
 if(!name) return;

 await db.collection("equipos").doc(teamId).collection("jugadores").add({
  nombre:name,ab:0,h:0,hr:0
 });

 loadPlayers();
}

async function update(id,type){
 let ref=db.collection("equipos").doc(teamId).collection("jugadores").doc(id);
 let docu=await ref.get();
 let p=docu.data();

 if(type=="out") p.ab++;
 if(type=="hit"){p.ab++;p.h++;}
 if(type=="hr"){p.ab++;p.h++;p.hr++;}

 await ref.update(p);
 loadPlayers();
}

// HISTORIAL
async function saveDay(){
 let snap=await db.collection("equipos").doc(teamId).collection("jugadores").get();

 let jugadores=[];
 snap.forEach(d=>jugadores.push(d.data()));

 await db.collection("equipos").doc(teamId).collection("historial").add({
  fecha:new Date().toLocaleString(),
  jugadores
 });

 alert("Guardado");
}

async function showHistory(){
 let snap=await db.collection("equipos").doc(teamId).collection("historial").get();

 let txt="HISTORIAL\n\n";

 snap.forEach(d=>{
  let dia=d.data();
  txt+=dia.fecha+"\n";
  dia.jugadores.forEach(p=>{
   txt+=`${p.nombre} H:${p.h} HR:${p.hr}\n`;
  });
  txt+="------\n";
 });

 alert(txt);
}

// RANKING
async function showRanking(){
 let snap=await db.collection("equipos").doc(teamId).collection("jugadores").get();

 let arr=[];
 snap.forEach(d=>{
  let p=d.data();
  let avg=p.ab? p.h/p.ab:0;
  arr.push({nombre:p.nombre,avg});
 });

 arr.sort((a,b)=>b.avg-a.avg);

 let txt="Ranking\n\n";
 arr.forEach((p,i)=>{
  txt+=`${i+1}. ${p.nombre} ${p.avg.toFixed(3)}\n`;
 });

 alert(txt);
}

async function rankingGlobal(){
 let equipos=await db.collection("equipos").get();
 let arr=[];

 for(const e of equipos.docs){
  let jugadores=await db.collection("equipos").doc(e.id).collection("jugadores").get();
  jugadores.forEach(j=>{
   let p=j.data();
   let avg=p.ab? p.h/p.ab:0;
   arr.push({nombre:p.nombre,avg});
  });
 }

 arr.sort((a,b)=>b.avg-a.avg);

 let txt="GLOBAL\n\n";
 arr.slice(0,10).forEach((p,i)=>{
  txt+=`${i+1}. ${p.nombre} ${p.avg.toFixed(3)}\n`;
 });

 alert(txt);
}

// NUEVA TEMP
async function newSeason(){
 let snap=await db.collection("equipos").doc(teamId).collection("jugadores").get();

 snap.forEach(d=>{
  db.collection("equipos").doc(teamId).collection("jugadores").doc(d.id)
  .update({ab:0,h:0,hr:0});
 });

 loadPlayers();
}

</script>

</body>
</html>
