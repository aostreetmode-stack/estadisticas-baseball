<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estadísticas Softball</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e2b3a">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e2b3a, #24384f);
  color: white;
  text-align: center;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  background: #4da3ff;
  color: white;
}

.card {
  background: #2e3f55;
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
  position: relative;
}

.deleteBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.out { background:red; }
.hit { background:#888; }
.hr { background:green; }
.bb { background:#f1c40f; color:black; }

.nombreJugador {
  font-size: 26px;
  font-weight: bold;
}

.modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modalContent {
  background:#1f2f44;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-height:80%;
  overflow:auto;
  text-align:left;
}

.diaBox {
  background:#2e3f55;
  margin-bottom:15px;
  padding:10px;
  border-radius:10px;
}

.playerRow {
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.top {
  color:#00ffcc;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>⚾ Estadísticas Softball</h1>

<div id="login">
  <input id="emailInput" placeholder="Correo"><br>
  <input id="passInput" type="password" placeholder="Contraseña"><br>

  <button onclick="login()">Entrar</button>
  <button onclick="crearCuenta()">Crear cuenta</button>
  <button onclick="invitado()">Invitado</button>
</div>

<div id="equipos" style="display:none;">
  <h2>Equipos</h2>
  <button onclick="crearEquipo()">+ Crear equipo</button>
  <button onclick="rankingGlobal()">🏆 Ranking Global</button>
  <div id="listaEquipos"></div>
</div>

<div id="app" style="display:none;">
  <h2 id="teamName"></h2>

  <button onclick="agregarJugador()">+ Jugador</button><br>

  <button onclick="guardarDia()">Guardar día</button>
  <button onclick="verHistorial()">Historial</button>
  <button onclick="verRanking()">AVG</button>
  <button onclick="rankingHR()">HR 🔥</button>
  <button onclick="nuevaTemp()">Nueva temporada</button>
  <button onclick="salir()">Salir</button>

  <div id="jugadores"></div>

  <button onclick="borrarHistorial()">🧹 Borrar historial</button>
</div>

<div id="modal" class="modal" onclick="cerrarModal()">
  <div class="modalContent" id="modalContent"></div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDF4CBmDYdhWWdML55_mh4x4wUpTp2-tg",
  authDomain: "softball-stats-44e46.firebaseapp.com",
  projectId: "softball-stats-44e46",
  storageBucket: "softball-stats-44e46.firebasestorage.app",
  messagingSenderId: "239247616602",
  appId: "1:239247616602:web:5606cc1c8d25f99d20c663"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;
window.firebaseReady = true; // 🔥 FIX
</script>

<script>
let usuario = null;
let passActual = null;
let equipoActual = null;
let jugadores = [];
let historial = [];

/* LOGIN */
function login(){
  let e = emailInput.value;
  let p = passInput.value;
  if(!e || !p) return alert("Llena todo");

  usuario = e;
  passActual = p;
  setTimeout(()=>entrarEquipos(),100);
}

function crearCuenta(){
  let e = emailInput.value;
  let p = passInput.value;
  if(!e || !p) return alert("Llena todo");

  usuario = e;
  passActual = p;
  alert("Cuenta creada");
  setTimeout(()=>entrarEquipos(),100);
}

function invitado(){
  usuario = "invitado";
  passActual = null;
  setTimeout(()=>entrarEquipos(),100);
}

/* EQUIPOS */
function entrarEquipos(){
  login.style.display="none";
  equipos.style.display="block";
  renderEquipos();
}

function crearEquipo(){
  if(usuario==="invitado") return alert("Invitado no puede crear");

  let nombre = prompt("Nombre equipo");
  if(!nombre) return;

  let equipos = JSON.parse(localStorage.getItem("equipos"))||[];

  equipos.push({
    nombre,
    jugadores:[],
    historial:[],
    owner:usuario,
    pass:passActual
  });

  localStorage.setItem("equipos",JSON.stringify(equipos));

  // 🔥 FIX FIREBASE
  if(window.firebaseReady){
    window.addDoc(window.collection(window.db, "equipos"), {
      nombre: nombre,
      owner: usuario
    }).then(()=>{
      console.log("Guardado en Firebase");
    }).catch((e)=>{
      console.error("Error:", e);
    });
  }

  renderEquipos();
}

function renderEquipos(){
  let equipos = JSON.parse(localStorage.getItem("equipos"))||[];
  listaEquipos.innerHTML="";

  equipos.forEach((e,i)=>{
    listaEquipos.innerHTML+=`
    <div class="card">
      ${e.nombre}<br>
      <button onclick="entrarEquipo(${i})">Entrar</button>
    </div>`;
  });
}

function entrarEquipo(i){
  let equipos = JSON.parse(localStorage.getItem("equipos"));
  let eq = equipos[i];

  equipoActual=i;
  jugadores=eq.jugadores||[];
  historial=eq.historial||[];

  equipos.style.display="none";
  app.style.display="block";

  teamName.innerText=eq.nombre;
  renderJugadores();
}

function guardarEquipo(){
  let equipos = JSON.parse(localStorage.getItem("equipos"));
  equipos[equipoActual].jugadores=jugadores;
  equipos[equipoActual].historial=historial;
  localStorage.setItem("equipos",JSON.stringify(equipos));

  // 🔥 GUARDAR EN FIREBASE (SIN TOCAR NADA MÁS)
  if(window.db){
    addDoc(collection(window.db, "equipos"), {
      nombre: equipos[equipoActual].nombre,
      jugadores: jugadores,
      historial: historial,
      owner: usuario
    });
  }
}

/* JUGADORES */
function agregarJugador(){
  let n=prompt("Nombre jugador");
  if(!n) return;

  jugadores.push({
    nombre:n,
    AB:0,H:0,HR:0,BB:0,
    dia:{AB:0,H:0,HR:0,BB:0}
  });

  guardarEquipo();
  renderJugadores();
}

function renderJugadores(){
  jugadoresDiv.innerHTML="";

  jugadores.forEach((j,i)=>{
    let avg = j.AB ? (j.H/j.AB).toFixed(3) : 0;

    jugadoresDiv.innerHTML+=`
    <div class="card">
      <div class="nombreJugador">${j.nombre}</div>
      AB:${j.AB} H:${j.H} HR:${j.HR} BB:${j.BB} AVG:${avg}<br>

      <button class="out" onclick="out(${i})">OUT</button>
      <button class="hit" onclick="hit(${i})">HIT</button>
      <button class="hr" onclick="hr(${i})">HR</button>
      <button class="bb" onclick="bb(${i})">BB</button>
    </div>`;
  });
}

/* ACCIONES */
function out(i){ jugadores[i].AB++; jugadores[i].dia.AB++; guardarEquipo(); renderJugadores();}
function hit(i){ jugadores[i].AB++; jugadores[i].H++; jugadores[i].dia.AB++; jugadores[i].dia.H++; guardarEquipo(); renderJugadores();}
function hr(i){ jugadores[i].AB++; jugadores[i].H++; jugadores[i].HR++; jugadores[i].dia.AB++; jugadores[i].dia.H++; jugadores[i].dia.HR++; guardarEquipo(); renderJugadores();}
function bb(i){ jugadores[i].BB++; jugadores[i].dia.BB++; guardarEquipo(); renderJugadores();}

/* HISTORIAL */
function verHistorial(){
  if(historial.length==0) return alert("No hay historial");

  let html="";

  historial.forEach(d=>{
    html+=`<div class="diaBox"><h3>📅 ${d.fecha}</h3>`;

    let lista=[...d.jugadores];

    lista.sort((a,b)=>{
      let A=a.AB?a.H/a.AB:0;
      let B=b.AB?b.H/b.AB:0;
      return B-A;
    });

    lista.forEach((j,i)=>{
      let avg = j.AB ? (j.H/j.AB).toFixed(3) : "0.000";

      html+=`
      <div class="playerRow ${i==0?'top':''}">
        <span>${i+1}. ${j.nombre}</span>
        <span>${avg}</span>
      </div>`;
    });

    html+="</div>";
  });

  modalContent.innerHTML = html;
  modal.style.display="flex";
}

function cerrarModal(){
  modal.style.display="none";
}

function guardarDia(){
  let fecha = new Date().toLocaleDateString();

  let resumen = {
    fecha,
    jugadores: jugadores.map(j=>({
      nombre:j.nombre,
      AB:j.dia.AB,
      H:j.dia.H,
      HR:j.dia.HR,
      BB:j.dia.BB
    }))
  };

  historial.push(resumen);

  jugadores.forEach(j=> j.dia={AB:0,H:0,HR:0,BB:0});

  guardarEquipo();
  alert("Día guardado");
}

function borrarHistorial(){
  historial=[];
  guardarEquipo();
  alert("Historial borrado");
}
</script>

</body>
</html>
