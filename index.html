<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas Softball</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:10px;
}

h1{
    text-align:center;
}

select, button{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.hit{background:green;}
.out{background:red;}
.hr{background:orange;}

.card{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    margin-bottom:8px;
}

</style>
</head>

<body>

<h1>⚾ Estadísticas</h1>
<h3 id="lider">💣 HR líder: ---</h3>

<select id="jugador"></select>

<button class="hit" onclick="play('hit')">Hit</button>
<button class="out" onclick="play('out')">Out</button>
<button class="hr" onclick="play('hr')">HR</button>

<button onclick="reset()">Nueva temporada</button>

<div id="tabla"></div>

<script>

let nombres = [
"Jugador 1","Jugador 2","Jugador 3","Jugador 4",
"Jugador 5","Jugador 6","Jugador 7","Jugador 8",
"Jugador 9","Jugador 10","Jugador 11","Jugador 12",
"Jugador 13","Jugador 14","Jugador 15","Jugador 16"
];

let data = JSON.parse(localStorage.getItem("stats")) || {};

nombres.forEach(n=>{
    if(!data[n]){
        data[n]={hits:0, turnos:0, hr:0};
    }
});

let select = document.getElementById("jugador");

nombres.forEach(n=>{
    let opt = document.createElement("option");
    opt.value = n;
    opt.textContent = n;
    select.appendChild(opt);
});

function play(tipo){
    let j = select.value;

    data[j].turnos++;

    if(tipo==="hit") data[j].hits++;
    if(tipo==="hr"){
        data[j].hits++;
        data[j].hr++;
    }

    save();
    render();
}

function avg(p){
    return p.turnos ? (p.hits/p.turnos).toFixed(3) : "0.000";
}

function render(){

    let arr = Object.entries(data);

    arr.sort((a,b)=> avg(b[1]) - avg(a[1]));

    let html = "";

    arr.forEach((p,i)=>{
        let nombre = p[0];
        let s = p[1];

        html += `
        <div class="card">
        #${i+1} ${nombre}<br>
        AVG: ${avg(s)} | H: ${s.hits} | AB: ${s.turnos} | HR: ${s.hr}
        </div>
        `;
    });

    document.getElementById("tabla").innerHTML = html;

    // HR líder
    let hrLeader = arr.sort((a,b)=> b[1].hr - a[1].hr)[0];
    document.getElementById("lider").innerText =
        "💣 HR líder: " + hrLeader[0] + " ("+hrLeader[1].hr+")";
}

function save(){
    localStorage.setItem("stats", JSON.stringify(data));
}

function reset(){
    localStorage.removeItem("stats");
    location.reload();
}

render();

</script>

</body>
</html>
