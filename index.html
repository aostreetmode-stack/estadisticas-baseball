<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas CUB Thunder</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:10px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

/* BOTONES PRINCIPALES */
.controls{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}

.controls button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:#334155;
  color:white;
}

/* TARJETA */
.player{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

/* NOMBRE */
.name{
  font-size:22px;
  font-weight:900;
  margin-bottom:5px;
  text-align:center;
}

/* STATS */
.stats{
  font-size:14px;
  margin-bottom:8px;
}

/* BOTONES */
.actions{
  display:flex;
  gap:5px;
}

.actions button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  font-size:16px;
}

.out{background:#ef4444;}
.hit{background:#e5e7eb;color:black;}
.hr{background:#22c55e;}
</style>
</head>

<body>

<div class="top">
  <div>AVG líder: <span id="bestAvg">---</span></div>
  <div>💣 HR líder: <span id="bestHR">---</span></div>
</div>

<div class="controls">
  <button onclick="guardar()">💾 Guardar día</button>
  <button onclick="verHistorial()">📅 Historial</button>
  <button onclick="exportar()">📦 Exportar</button>
  <button onclick="reset()">🗑 Nueva temporada</button>
</div>

<div id="players"></div>

<script>

// DATA INICIAL
let data = JSON.parse(localStorage.getItem("jugadores")) || 
Array(16).fill().map(()=>({name:"Jugador",ab:0,hits:0,hr:0}));

let historial = JSON.parse(localStorage.getItem("historial")) || [];

// CALCULAR AVG (SIN DECIMAL)
function calcAvg(p){
  if(p.ab === 0) return 0;
  return Math.round((p.hits / p.ab) * 1000);
}

// GUARDAR
function save(){
  localStorage.setItem("jugadores", JSON.stringify(data));
}

// RENDER
function render(){
  let html = "";

  let orden = [...data].sort((a,b)=>calcAvg(b)-calcAvg(a));

  let bestAvg = "---";
  let bestHR = "---";

  if(orden.length){
    bestAvg = orden[0].name + " (" + calcAvg(orden[0]) + ")";
    bestHR = orden.sort((a,b)=>b.hr-a.hr)[0].name;
  }

  document.getElementById("bestAvg").innerText = bestAvg;
  document.getElementById("bestHR").innerText = bestHR;

  orden.forEach((p,i)=>{
    let avg = calcAvg(p);

    html += `
    <div class="player">
      <div class="name">${i+1}. 
        <input value="${p.name}" onchange="setName(${data.indexOf(p)}, this.value)">
      </div>

      <div class="stats">
        AB:${p.ab} H:${p.hits} HR:${p.hr} AVG:${avg}
      </div>

      <div class="actions">
        <button class="out" onclick="out(${data.indexOf(p)})">OUT</button>
        <button class="hit" onclick="hit(${data.indexOf(p)})">HIT</button>
        <button class="hr" onclick="hr(${data.indexOf(p)})">HR</button>
      </div>
    </div>
    `;
  });

  document.getElementById("players").innerHTML = html;
}

// FUNCIONES
function setName(i,val){data[i].name=val;save();}
function out(i){data[i].ab++;save();render();}
function hit(i){data[i].ab++;data[i].hits++;save();render();}
function hr(i){data[i].ab++;data[i].hits++;data[i].hr++;save();render();}

// RESET TEMPORADA (SIN BORRAR HISTORIAL)
function reset(){
  data = data.map(p=>({name:"Jugador",ab:0,hits:0,hr:0}));
  save();
  render();
}

// GUARDAR DÍA
function guardar(){
  historial.push(JSON.parse(JSON.stringify(data)));
  localStorage.setItem("historial", JSON.stringify(historial));
  alert("Guardado 👍");
}

// VER HISTORIAL
function verHistorial(){
  alert("Historial guardado: " + historial.length + " días");
}

// EXPORTAR
function exportar(){
  alert(JSON.stringify(data));
}

// INICIO
render();

</script>

</body>
</html>
