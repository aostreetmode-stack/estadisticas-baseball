<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softball Stats Pro</title>

<link rel="icon" href="icon.jpg">
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1f2937;
  color:white;
}

.container{
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.login{background:#2563eb;color:white;}
.register{background:#16a34a;color:white;}
.logout{background:#dc2626;color:white;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container" id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button class="login" onclick="login()">Login</button>
  <button class="register" onclick="register()">Crear cuenta</button>
</div>

<div class="container hidden" id="appBox">
  <h2>Bienvenido ⚾</h2>
  <p id="userEmail"></p>
  <button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDF4CBmDYdhWWdML55_mh4x4wUpTp2-tg",
  authDomain: "softball-stats-44e46.firebaseapp.com",
  projectId: "softball-stats-44e46",
  storageBucket: "softball-stats-44e46.firebasestorage.app",
  messagingSenderId: "239247616602",
  appId: "1:239247616602:web:5606cc1c8d25f99d20c663"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{
    alert("Bienvenido 🔥");
  })
  .catch(err=>alert(err.message));
}

window.register = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
  .then(()=>{
    alert("Cuenta creada ✅");
  })
  .catch(err=>alert(err.message));
}

window.logout = function(){
  signOut(auth);
}

onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");
    document.getElementById("userEmail").innerText = user.email;
  }else{
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("appBox").classList.add("hidden");
  }
});

</script>

</body>
</html>
