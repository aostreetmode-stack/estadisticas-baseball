<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softball Stats Pro</title>

<style>
body{margin:0;font-family:Arial;background:#1f2937;color:white;}
.container{padding:15px;}
.player{background:#374151;padding:12px;border-radius:12px;margin-bottom:12px;position:relative;}
input{width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:10px;}
.row{display:flex;gap:10px;}
button{flex:1;padding:12px;border:none;border-radius:12px;font-weight:bold;}
.out{background:#ef4444;}
.hit{background:#d1d5db;color:black;}
.hr{background:#22c55e;}
.delete{
  position:absolute;
  right:10px;
  top:10px;
  background:#ef4444;
  color:white;
  width:40px;
  height:40px;
  border-radius:10px;
}
.card{background:#374151;padding:12px;border-radius:12px;margin-top:15px;}
.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<div id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Crear cuenta</button>
  <button onclick="guest()">Invitado</button>
</div>

<div id="appBox" class="hidden">

<div id="leaders" class="card">🔥 Líderes</div>
<div id="players"></div>

<div class="card">
  <button onclick="newSeason()">Nueva temporada</button>
</div>

<button onclick="logout()">Cerrar sesión</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDF4CBmDYdhWWdML55_mh4x4wUpTp2-tg",
  authDomain: "softball-stats-44e46.firebaseapp.com",
  projectId: "softball-stats-44e46",
  storageBucket: "softball-stats-44e46.firebasestorage.app",
  messagingSenderId: "239247616602",
  appId: "1:239247616602:web:5606cc1c8d25f99d20c663"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let players=[];
let uid="";
let role="guest";

window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.register=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.guest=()=>signInAnonymously(auth);
window.logout=()=>signOut(auth);

onAuthStateChanged(auth, async (user)=>{
  if(user){
    uid=user.uid;

    loginBox.classList.add("hidden");
    appBox.classList.remove("hidden");

    role = user.email==="ortelio.garciaulloa@gmail.com" ? "admin" : "user";

    await loadData();
    createPlayers();

  }else{
    loginBox.classList.remove("hidden");
    appBox.classList.add("hidden");
  }
});

async function loadData(){
  let snap=await get(ref(db,"users/"+uid+"/players"));
  if(snap.exists()){
    players=snap.val();
  }
}

function saveData(){
  set(ref(db,"users/"+uid+"/players"),players);
}

function createPlayers(){
  let c=document.getElementById("players");
  c.innerHTML="";

  if(players.length===0){
    for(let i=0;i<9;i++){
      players.push({name:"",ab:0,h:0,hr:0});
    }
  }

  players.forEach((p,i)=>{

    let locked = p.ab > 0;

    let div=document.createElement("div");
    div.className="player";

    div.innerHTML=`

      ${role==="admin" ? `<button class="delete" onclick="deletePlayer(${i})">X</button>` : ""}

      <input 
        value="${p.name}" 
        ${locked ? "disabled" : ""}
        placeholder="Jugador ${i+1}"
        onchange="updateName(${i},this.value)">

      <div id="stats${i}"></div>

      <div class="row">
        <button class="out" onclick="update(${i},'out')">OUT</button>
        <button class="hit" onclick="update(${i},'hit')">HIT</button>
        <button class="hr" onclick="update(${i},'hr')">HR</button>
      </div>
    `;

    c.appendChild(div);
  });

  render();
  updateLeaders();
}

window.updateName=(i,v)=>{
  if(players[i].ab>0) return; // 🔒 NO CAMBIAR NOMBRE
  players[i].name=v;
  saveData();
};

window.update=(i,t)=>{
  players[i].ab++;
  if(t==="hit") players[i].h++;
  if(t==="hr"){players[i].h++;players[i].hr++;}
  render();
  updateLeaders();
  saveData();
};

// ❌ ELIMINAR SIEMPRE (CON CONFIRMACIÓN)
window.deletePlayer=(i)=>{
  let ok = confirm("¿Eliminar este jugador? (aunque tenga estadísticas)");
  if(!ok) return;

  players[i]={name:"",ab:0,h:0,hr:0};

  saveData();
  createPlayers();
};

function render(){
  players.forEach((p,i)=>{
    let avg=p.ab?(p.h/p.ab).toFixed(3):"0.000";
    document.getElementById("stats"+i).innerText=
    `#${i+1} AB:${p.ab} H:${p.h} HR:${p.hr} AVG:${avg}`;
  });
}

function updateLeaders(){
  let bestAvg=null;
  let bestHR=null;

  players.forEach(p=>{
    if(!p.name) return;

    let avg=p.ab?(p.h/p.ab):0;

    if(!bestAvg || avg>bestAvg.avg){
      bestAvg={name:p.name,avg:avg.toFixed(3)};
    }

    if(!bestHR || p.hr>bestHR.hr){
      bestHR={name:p.name,hr:p.hr};
    }
  });

  leaders.innerHTML=`
    🏆 AVG líder: ${bestAvg?bestAvg.name+" ("+bestAvg.avg+")":"---"}<br>
    💣 HR líder: ${bestHR?bestHR.name+" ("+bestHR.hr+")":"---"}
  `;
}

window.newSeason=()=>{
  players.forEach(p=>{p.ab=0;p.h=0;p.hr=0;p.name=""});
  saveData();
  createPlayers();
};

</script>

</body>
</html>
