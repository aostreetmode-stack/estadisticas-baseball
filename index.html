<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softball Stats Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1505843513577-22bb7d21e455");
  background-size:cover;
  background-attachment:fixed;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  font-weight:bold;
}

/* CARDS */
.card{
  background:rgba(30,41,59,0.95);
  margin:10px;
  padding:10px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-bottom:5px;
  font-size:16px;
}

.stats{
  font-size:13px;
  margin-bottom:5px;
}

/* BOTONES */
.botones{
  display:flex;
  gap:5px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

/* COLORES */
.out{background:#dc2626;color:white;}
.hit{background:#9ca3af;color:black;}
.hr{background:#16a34a;color:white;}

.guardar{background:#2563eb;color:white;}
.historial{background:#7c3aed;color:white;}
.reset{background:#facc15;color:black;margin:10px;width:calc(100% - 20px);}

/* EFECTO LÍDER */
.lider{
  border:2px solid gold;
}
</style>
</head>

<body>

<div class="header">⚾ Estadísticas Softball</div>

<div class="top">
  <div>🏆 AVG líder: <span id="liderAVG">---</span></div>
  <div>💣 HR líder: <span id="liderHR">---</span></div>
</div>

<div id="players"></div>

<div style="padding:10px;">
  <button class="guardar" onclick="guardarDia()">Guardar día</button>
  <button class="historial" onclick="verHistorial()">Historial</button>
  <button class="reset" onclick="resetear()">Nueva temporada</button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("players")) || 
Array(16).fill(0).map(()=>({name:"",ab:0,hits:0,hr:0}));

function render(){
  let container = document.getElementById("players");
  container.innerHTML="";

  // ordenar ranking
  data.sort((a,b)=>{
    let avgA = a.ab ? a.hits/a.ab : 0;
    let avgB = b.ab ? b.hits/b.ab : 0;
    return avgB - avgA;
  });

  let liderAVG = data[0]?.name || "---";
  let liderHR = data.reduce((a,b)=> b.hr>a.hr?b:a).name || "---";

  document.getElementById("liderAVG").innerText = liderAVG;
  document.getElementById("liderHR").innerText = liderHR;

  data.forEach((p,i)=>{
    let avg = p.ab ? (p.hits/p.ab).toFixed(3) : "0.000";

    container.innerHTML += `
    <div class="card ${i===0 ? 'lider' : ''}">
      <input value="${p.name}" placeholder="Jugador" onchange="setNombre(${i},this.value)">

      <div class="stats">
        #${i+1} | AB:${p.ab} H:${p.hits} HR:${p.hr} AVG:${avg}
      </div>

      <div class="botones">
        <button class="out" onclick="accion(${i},'out')">OUT</button>
        <button class="hit" onclick="accion(${i},'hit')">HIT</button>
        <button class="hr" onclick="accion(${i},'hr')">HR</button>
      </div>
    </div>
    `;
  });

  guardar();
}

function setNombre(i,val){
  data[i].name = val;
  guardar();
}

function accion(i,tipo){
  data[i].ab++;

  if(tipo==="hit") data[i].hits++;
  if(tipo==="hr"){
    data[i].hits++;
    data[i].hr++;
  }

  render();
}

function guardar(){
  localStorage.setItem("players",JSON.stringify(data));
}

function resetear(){
  if(confirm("¿Seguro nueva temporada?")){
    localStorage.clear();
    location.reload();
  }
}

function guardarDia(){
  let historial = JSON.parse(localStorage.getItem("historial")) || [];

  historial.push({
    fecha:new Date().toLocaleString(),
    data:JSON.parse(JSON.stringify(data))
  });

  localStorage.setItem("historial",JSON.stringify(historial));
  alert("Día guardado 🔥");
}

function verHistorial(){
  let historial = JSON.parse(localStorage.getItem("historial")) || [];

  if(historial.length===0){
    alert("No hay historial");
    return;
  }

  let texto="";

  historial.forEach(dia=>{
    texto += "📅 "+dia.fecha+"\n";

    dia.data.forEach(p=>{
      let avg = p.ab ? (p.hits/p.ab).toFixed(3) : "0.000";
      texto += `${p.name||"Jugador"} | H:${p.hits} HR:${p.hr} AVG:${avg}\n`;
    });

    texto+="\n----------------\n";
  });

  alert(texto);
}

render();

</script>

</body>
</html>
