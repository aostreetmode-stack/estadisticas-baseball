<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softball Stats</title>

<style>
body {
  font-family: Arial;
  background: #1e2a38;
  color: white;
  margin: 0;
  padding: 10px;
}

h1 {
  text-align: center;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px;
}

.container {
  max-width: 500px;
  margin: auto;
}

.player {
  background: #2f3e52;
  padding: 10px;
  margin: 10px 0;
  border-radius: 15px;
}

input {
  width: 70%;
  padding: 8px;
  border-radius: 10px;
  border: none;
}

.locked {
  background: #888;
}

.btn-out { background: red; color: white; }
.btn-hit { background: gray; }
.btn-hr { background: green; color: white; }

.top-buttons {
  text-align: center;
}
</style>

</head>
<body>

<div class="container">

<h1>⚾ Estadísticas Softball</h1>

<div class="top-buttons">
  <button onclick="agregarJugador()">➕ Agregar jugador</button><br>
  <button onclick="guardarDia()">Guardar día</button>
  <button onclick="verHistorial()">Historial</button>
  <button onclick="verRanking()">Ranking</button><br>
  <button onclick="nuevaTemporada()">Nueva temporada</button>
</div>

<div id="players"></div>

</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInAnonymously,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDF4CBmDY...",
  authDomain: "softball-stats-44e46.firebaseapp.com",
  projectId: "softball-stats-44e46",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN automático invitado
signInAnonymously(auth);

// =====================

let jugadores = JSON.parse(localStorage.getItem("jugadores")) || [];
let historial = JSON.parse(localStorage.getItem("historial")) || [];

if (jugadores.length === 0) {
  for (let i = 0; i < 12; i++) {
    jugadores.push(crearJugador(i));
  }
}

function crearJugador(i) {
  return {
    nombre: "",
    AB: 0,
    H: 0,
    HR: 0,
    locked: false
  };
}

function guardar() {
  localStorage.setItem("jugadores", JSON.stringify(jugadores));
}

function render() {
  const div = document.getElementById("players");
  div.innerHTML = "";

  jugadores.forEach((j, i) => {
    let avg = j.AB ? (j.H / j.AB).toFixed(3) : "0.000";

    div.innerHTML += `
      <div class="player">
        <input 
          value="${j.nombre}" 
          ${j.locked ? "disabled class='locked'" : ""}
          onchange="bloquear(${i}, this.value)"
        >
        <button onclick="eliminar(${i})">X</button>

        <p>#${i+1} | AB:${j.AB} H:${j.H} HR:${j.HR} AVG:${avg}</p>

        <button class="btn-out" onclick="out(${i})">OUT</button>
        <button class="btn-hit" onclick="hit(${i})">HIT</button>
        <button class="btn-hr" onclick="hr(${i})">HR</button>
      </div>
    `;
  });
}

window.bloquear = (i, nombre) => {
  if (nombre.trim() === "") return;
  jugadores[i].nombre = nombre;
  jugadores[i].locked = true;
  guardar();
  render();
};

window.eliminar = (i) => {
  jugadores.splice(i, 1);
  guardar();
  render();
};

window.out = (i) => {
  jugadores[i].AB++;
  guardar();
  render();
};

window.hit = (i) => {
  jugadores[i].AB++;
  jugadores[i].H++;
  guardar();
  render();
};

window.hr = (i) => {
  jugadores[i].AB++;
  jugadores[i].H++;
  jugadores[i].HR++;
  guardar();
  render();
};

window.agregarJugador = () => {
  if (jugadores.length >= 16) return alert("Máximo 16");
  jugadores.push(crearJugador(jugadores.length));
  guardar();
  render();
};

window.nuevaTemporada = () => {
  jugadores.forEach(j => {
    j.AB = 0;
    j.H = 0;
    j.HR = 0;
  });
  guardar();
  render();
};

window.guardarDia = () => {
  let fecha = new Date().toLocaleString();
  let data = jugadores.map(j =>
    `${j.nombre} H:${j.H} HR:${j.HR}`
  ).join("\n");

  historial.push(fecha + "\n" + data);
  localStorage.setItem("historial", JSON.stringify(historial));
  alert("Guardado");
};

window.verHistorial = () => {
  alert(historial.join("\n\n"));
};

window.verRanking = () => {
  let ranking = [...jugadores]
    .filter(j => j.nombre)
    .sort((a,b) => (b.H/b.AB || 0) - (a.H/a.AB || 0));

  let texto = ranking.map((j,i)=>{
    let avg = j.AB ? (j.H/j.AB).toFixed(3) : "0.000";
    return `${i+1}. ${j.nombre} AVG:${avg}`;
  }).join("\n");

  alert(texto || "Sin datos");
};

render();

</script>

</body>
</html>
