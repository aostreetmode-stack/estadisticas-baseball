<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas Baseball</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:15px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin:5px 0;
    font-size:16px;
}

.buttons{
    display:flex;
    gap:8px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

.hit{background:#16a34a;}
.out{background:#dc2626;}
.hr{background:#f59e0b;}
.reset{background:#334155;}

.player{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

.rank{
    font-size:18px;
    font-weight:bold;
    color:#38bdf8;
}
</style>
</head>

<body>

<h1>⚾ Estadísticas</h1>
<h3>💣 HR líder: <span id="lider">---</span></h3>

<input id="nombre" placeholder="Nombre del jugador">

<div class="buttons">
<button class="hit" onclick="jugar('hit')">Hit</button>
<button class="out" onclick="jugar('out')">Out</button>
<button class="hr" onclick="jugar('hr')">HR</button>
</div>

<button class="reset" onclick="resetear()">Nueva temporada</button>

<div id="lista"></div>

<script>
let jugadores = JSON.parse(localStorage.getItem("jugadores")) || [];

function jugar(tipo){
    let nombre = document.getElementById("nombre").value.trim();
    if(!nombre) return alert("Pon el nombre del jugador");

    let jugador = jugadores.find(j => j.nombre === nombre);

    if(!jugador){
        jugador = {nombre, hits:0, turnos:0, hr:0};
        jugadores.push(jugador);
    }

    if(tipo==="hit"){
        jugador.hits++;
        jugador.turnos++;
    }

    if(tipo==="out"){
        jugador.turnos++;
    }

    if(tipo==="hr"){
        jugador.hits++;
        jugador.turnos++;
        jugador.hr++;
    }

    localStorage.setItem("jugadores", JSON.stringify(jugadores));
    mostrar();
}

function mostrar(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    // Ranking por AVG
    jugadores.sort((a,b)=> (b.hits/b.turnos)-(a.hits/a.turnos));

    // HR líder
    let liderHR = [...jugadores].sort((a,b)=>b.hr-a.hr)[0];
    document.getElementById("lider").innerText =
        liderHR ? `${liderHR.nombre} (${liderHR.hr})` : "---";

    jugadores.forEach((j,i)=>{
        let avg = j.turnos ? (j.hits/j.turnos).toFixed(3) : "0.000";

        lista.innerHTML += `
        <div class="player">
            <div class="rank">#${i+1} ${j.nombre}</div>
            AVG: ${avg} | H: ${j.hits} | AB: ${j.turnos} | HR: ${j.hr}
        </div>`;
    });
}

function resetear(){
    localStorage.clear();
    jugadores=[];
    mostrar();
}

mostrar();
</script>

</body>
</html>                                           <input id="nombre" placeholder="Nombre del jugador">
                                                                  <input id="hits" type="number" placeholder="Hits">
                                                                  <input id="turnos" type="number" placeholder="Turnos">

                                                                  <div class="controls">
                                                                    <button onclick="agregar()">Guardar día</button>
                                                                      <button onclick="nuevaTemporada()">Nueva temporada</button>
                                                                        <button onclick="verHistorial()">Historial</button>
                                                                        </div>

                                                                        <div id="lista"></div>

                                                                        <script>
                                                                        let jugadores = JSON.parse(localStorage.getItem("jugadores")) || [];
                                                                        let historial = JSON.parse(localStorage.getItem("historial")) || [];

                                                                        function guardar(){
                                                                          localStorage.setItem("jugadores", JSON.stringify(jugadores));
                                                                            localStorage.setItem("historial", JSON.stringify(historial));
                                                                            }

                                                                            function agregar(){
                                                                              let nombre = document.getElementById("nombre").value;
                                                                                let hits = parseInt(document.getElementById("hits").value);
                                                                                  let turnos = parseInt(document.getElementById("turnos").value);

                                                                                    if(!nombre || isNaN(hits) || isNaN(turnos)) return;

                                                                                      let existente = jugadores.find(j => j.nombre === nombre);

                                                                                        if(existente){
                                                                                            existente.hits += hits;
                                                                                                existente.turnos += turnos;
                                                                                                  }else{
                                                                                                      jugadores.push({nombre, hits, turnos});
                                                                                                        }

                                                                                                          jugadores.forEach(j=>{
                                                                                                              j.promedio = Math.round((j.hits / j.turnos) * 1000);
                                                                                                                });

                                                                                                                  jugadores.sort((a,b)=>b.promedio - a.promedio);

                                                                                                                    guardar();
                                                                                                                      mostrar();
                                                                                                                      }

                                                                                                                      function mostrar(){
                                                                                                                        let lista = document.getElementById("lista");
                                                                                                                          lista.innerHTML = "";

                                                                                                                            jugadores.forEach((j,i)=>{
                                                                                                                                lista.innerHTML += `
                                                                                                                                      <div class="player">
                                                                                                                                              <div class="name">${i+1}. ${j.nombre}</div>
                                                                                                                                                      <div class="stats">
                                                                                                                                                                AVG: ${j.promedio} | H: ${j.hits} | AB: ${j.turnos}
                                                                                                                                                                        </div>
                                                                                                                                                                              </div>
                                                                                                                                                                                  `;
                                                                                                                                                                                    });
                                                                                                                                                                                    }

                                                                                                                                                                                    function nuevaTemporada(){
                                                                                                                                                                                      if(jugadores.length > 0){
                                                                                                                                                                                          historial.push({
                                                                                                                                                                                                fecha: new Date().toLocaleDateString(),
                                                                                                                                                                                                      datos: jugadores
                                                                                                                                                                                                          });
                                                                                                                                                                                                            }

                                                                                                                                                                                                              jugadores = [];
                                                                                                                                                                                                                guardar();
                                                                                                                                                                                                                  mostrar();
                                                                                                                                                                                                                  }

                                                                                                                                                                                                                  function verHistorial(){
                                                                                                                                                                                                                    let lista = document.getElementById("lista");
                                                                                                                                                                                                                      lista.innerHTML = "<h3>📅 Historial</h3>";

                                                                                                                                                                                                                        historial.forEach((h,i)=>{
                                                                                                                                                                                                                            lista.innerHTML += `
                                                                                                                                                                                                                                  <div class="player">
                                                                                                                                                                                                                                          <div class="name">Temporada ${i+1} (${h.fecha})</div>
                                                                                                                                                                                                                                                  <div class="stats">${h.datos.length} jugadores</div>
                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                            `;
                                                                                                                                                                                                                                                              });
                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                              mostrar();
                                                                                                                                                                                                                                                              </script>

                                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                                              </html>
