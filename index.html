<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softball Stats Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1f2937;
  color:white;
}

.container{padding:15px;}

.player{
  background:#374151;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

.row{display:flex;gap:10px;}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:15px;
}

.out{background:#ef4444;}
.hit{background:#d1d5db;color:black;}
.hr{background:#22c55e;}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:20px;
}

.btn-white{background:#f3f4f6;color:black;}
.btn-blue{background:#3b82f6;}
.btn-yellow{background:#facc15;color:black;}

.card{
  background:#374151;
  padding:12px;
  border-radius:12px;
  margin-top:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #555;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div id="players"></div>

<div class="actions">
  <button class="btn-white" onclick="saveDay()">Guardar día</button>
  <button class="btn-white" onclick="showHistory()">Historial</button>
  <button class="btn-blue" onclick="ranking()">Ranking</button>
  <button class="btn-yellow" onclick="newSeason()">Nueva temporada</button>
</div>

<div id="output"></div>

</div>

<script>

let players=[];
let history=JSON.parse(localStorage.getItem("history"))||[];

function createPlayers(){
  let container=document.getElementById("players");
  container.innerHTML="";
  
  for(let i=0;i<9;i++){
    players[i]={name:"",ab:0,h:0,hr:0};

    let div=document.createElement("div");
    div.className="player";

    div.innerHTML=`
      <input placeholder="Jugador ${i+1}" onchange="players[${i}].name=this.value">
      <div id="stats${i}">#${i+1} | AB:0 H:0 HR:0 AVG:0.000</div>
      <div class="row">
        <button class="out" onclick="update(${i},'out')">OUT</button>
        <button class="hit" onclick="update(${i},'hit')">HIT</button>
        <button class="hr" onclick="update(${i},'hr')">HR</button>
      </div>
    `;
    container.appendChild(div);
  }
}

function update(i,type){
  players[i].ab++;
  if(type==="hit") players[i].h++;
  if(type==="hr"){players[i].h++;players[i].hr++;}
  render();
}

function render(){
  players.forEach((p,i)=>{
    let avg=p.ab?(p.h/p.ab).toFixed(3):"0.000";
    document.getElementById("stats"+i).innerText=
      `#${i+1} | AB:${p.ab} H:${p.h} HR:${p.hr} AVG:${avg}`;
  });
}

function saveDay(){
  let today=new Date().toLocaleDateString();
  history.push({date:today,data:[...players]});
  localStorage.setItem("history",JSON.stringify(history));
  alert("Día guardado");
}

function showHistory(){
  let output="<div class='card'><h3>Historial</h3>";

  history.forEach(h=>{
    output+=`<div class="card"><b>${h.date}</b>`;
    h.data.forEach(p=>{
      let avg=p.ab?(p.h/p.ab).toFixed(3):"0.000";
      output+=`<p>${p.name || "Jugador"} - AVG:${avg}</p>`;
    });
    output+="</div>";
  });

  output+="</div>";
  document.getElementById("output").innerHTML=output;
}

function ranking(){
  let total={};

  history.forEach(day=>{
    day.data.forEach(p=>{
      if(!p.name) return;

      if(!total[p.name]) total[p.name]={ab:0,h:0,hr:0};

      total[p.name].ab+=p.ab;
      total[p.name].h+=p.h;
      total[p.name].hr+=p.hr;
    });
  });

  let arr=Object.entries(total).map(([name,stats])=>{
    return {
      name,
      ...stats,
      avg: stats.ab?(stats.h/stats.ab).toFixed(3):"0.000"
    }
  });

  arr.sort((a,b)=>b.avg-a.avg);

  let output="<div class='card'><h3>Ranking</h3><table>";
  output+="<tr><th>#</th><th>Jugador</th><th>AVG</th><th>HR</th></tr>";

  arr.forEach((p,i)=>{
    output+=`<tr>
      <td>${i+1}</td>
      <td>${p.name}</td>
      <td>${p.avg}</td>
      <td>${p.hr}</td>
    </tr>`;
  });

  output+="</table></div>";
  document.getElementById("output").innerHTML=output;
}

function newSeason(){
  if(confirm("Borrar todo el historial?")){
    localStorage.removeItem("history");
    location.reload();
  }
}

createPlayers();

</script>

</body>
</html>
