<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softball Stats Pro</title>

<!-- LIBRERÍA PARA EXPORTAR IMAGEN -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:#1f2937;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  font-weight:bold;
}

/* CARDS */
.card{
  background:#374151;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

/* NOMBRE */
.nombreInput{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-bottom:5px;
  font-size:18px;
  font-weight:bold;
  color:white;
  background:#6b7280;
}

.stats{
  font-size:13px;
  margin-bottom:5px;
}

/* BOTONES */
.botones{
  display:flex;
  gap:5px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.out{background:#dc2626;color:white;}
.hit{background:#9ca3af;color:black;}
.hr{background:#16a34a;color:white;}

.guardar{background:#2563eb;color:white;}
.historial{background:#7c3aed;color:white;}
.ranking{background:#0ea5e9;color:white;}
.exportar{background:#22c55e;color:white;}

.reset{background:#facc15;color:black;margin:10px;width:calc(100% - 20px);}

.borrar{
  background:#ef4444;
  color:black;
  font-size:20px;
  font-weight:bold;
  width:50px;
}

/* LÍDER */
.lider{
  border:2px solid gold;
}

.nombreRow{
  display:flex;
  gap:5px;
}
</style>
</head>

<body>

<div id="app">

<div class="header">⚾ Estadísticas Softball</div>

<div class="top">
  <div>🏆 AVG líder: <span id="liderAVG">---</span></div>
  <div>💣 HR líder: <span id="liderHR">---</span></div>
</div>

<div id="players"></div>

</div>

<div style="padding:10px;">
  <button class="guardar" onclick="guardarDia()">Guardar día</button>
  <button class="historial" onclick="verHistorial()">Historial</button>
  <button class="ranking" onclick="verRanking()">Ranking</button>
  <button class="exportar" onclick="exportarImagen()">📸 Exportar</button>
  <button class="reset" onclick="resetear()">Nueva temporada</button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("players")) || 
Array(16).fill(0).map(()=>({name:"",ab:0,hits:0,hr:0}));

function getAVG(p){
  return p.ab ? (p.hits/p.ab) : 0;
}

function render(){
  let container = document.getElementById("players");
  container.innerHTML="";

  let ranking = [...data].sort((a,b)=> getAVG(b)-getAVG(a));

  let lider = ranking[0];
  let liderAVG = lider?.name ? `${lider.name} (${getAVG(lider).toFixed(3)})` : "---";

  let liderHRplayer = data.reduce((a,b)=> b.hr>a.hr?b:a,{hr:0});
  let liderHR = liderHRplayer.hr > 0 ? liderHRplayer.name : "---";

  document.getElementById("liderAVG").innerText = liderAVG;
  document.getElementById("liderHR").innerText = liderHR;

  data.forEach((p,i)=>{
    let avg = getAVG(p).toFixed(3);
    let esLider = p === lider;

    container.innerHTML += `
    <div class="card ${esLider ? 'lider' : ''}">

      <div class="nombreRow">
        <input 
          class="nombreInput"
          value="${p.name}" 
          placeholder="Jugador"
          ${p.name ? "disabled" : ""}
          onchange="setNombre(${i},this.value)"
        >

        ${p.name ? `<button class="borrar" onclick="borrarJugador(${i})">✖</button>` : ""}
      </div>

      <div class="stats">
        #${i+1} | AB:${p.ab} H:${p.hits} HR:${p.hr} AVG:${avg}
      </div>

      <div class="botones">
        <button class="out" onclick="accion(${i},'out')">OUT</button>
        <button class="hit" onclick="accion(${i},'hit')">HIT</button>
        <button class="hr" onclick="accion(${i},'hr')">HR</button>
      </div>
    </div>
    `;
  });

  guardar();
}

function setNombre(i,val){
  if(!val.trim()) return;
  data[i].name = val;
  guardar();
  render();
}

function borrarJugador(i){
  if(confirm("¿Borrar jugador?")){
    data[i] = {name:"",ab:0,hits:0,hr:0};
    guardar();
    render();
  }
}

function accion(i,tipo){
  data[i].ab++;

  if(tipo==="hit") data[i].hits++;
  if(tipo==="hr"){
    data[i].hits++;
    data[i].hr++;
  }

  render();
}

function guardar(){
  localStorage.setItem("players",JSON.stringify(data));
}

function resetear(){
  if(confirm("¿Seguro nueva temporada?")){
    localStorage.clear();
    location.reload();
  }
}

function guardarDia(){
  let historial = JSON.parse(localStorage.getItem("historial")) || [];

  historial.push({
    fecha:new Date().toLocaleString(),
    data:JSON.parse(JSON.stringify(data))
  });

  localStorage.setItem("historial",JSON.stringify(historial));
  alert("Día guardado 🔥");
}

function verHistorial(){
  let historial = JSON.parse(localStorage.getItem("historial")) || [];

  if(historial.length===0){
    alert("No hay historial");
    return;
  }

  let texto="";

  historial.forEach(dia=>{
    texto += "📅 "+dia.fecha+"\n";

    dia.data.forEach(p=>{
      let avg = p.ab ? (p.hits/p.ab).toFixed(3) : "0.000";
      texto += `${p.name||"Jugador"} | H:${p.hits} HR:${p.hr} AVG:${avg}\n`;
    });

    texto+="\n----------------\n";
  });

  alert(texto);
}

function verRanking(){
  let ranking = [...data].sort((a,b)=> getAVG(b)-getAVG(a));

  let texto="🏆 RANKING POR AVG\n\n";

  ranking.forEach((p,i)=>{
    if(!p.name) return;
    let avg = getAVG(p).toFixed(3);
    texto += `${i+1}. ${p.name} - ${avg}\n`;
  });

  alert(texto);
}

/* EXPORTAR IMAGEN */
function exportarImagen(){
  html2canvas(document.getElementById("app")).then(canvas => {
    let link = document.createElement("a");
    link.download = "softball_stats.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

render();

</script>

</body>
</html>
