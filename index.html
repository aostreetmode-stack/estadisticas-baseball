<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estadísticas Softball</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e2b3a;
  color: white;
  text-align: center;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.card {
  background: #2e3f55;
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px;
  width: 80%;
}

.out { background:red; color:white;}
.hit { background:gray;}
.hr { background:green; color:white;}
</style>
</head>

<body>

<h1>⚾ Estadísticas Softball</h1>

<!-- LOGIN -->
<div id="login">
  <input id="emailInput" placeholder="Correo"><br>
  <input id="passInput" type="password" placeholder="Contraseña"><br>

  <button onclick="login()">Entrar</button>
  <button onclick="crearCuenta()">Crear cuenta</button>
  <button onclick="invitado()">Invitado</button>
</div>

<!-- EQUIPOS -->
<div id="equipos" style="display:none;">
  <h2>Equipos</h2>
  <button onclick="crearEquipo()">+ Crear equipo</button>
  <button onclick="rankingGlobal()">🏆 Ranking Global</button>

  <div id="listaEquipos"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h2 id="teamName"></h2>

  <button onclick="agregarJugador()">+ Jugador</button><br>

  <button onclick="guardarDia()">Guardar día</button>
  <button onclick="verHistorial()">Historial</button>
  <button onclick="verRanking()">Ranking</button>
  <button onclick="nuevaTemp()">Nueva temporada</button>
  <button onclick="salir()">Salir</button>

  <div id="jugadores"></div>
</div>

<script>
let usuario = null;
let equipoActual = null;
let jugadores = [];
let historial = [];

function getEmail(){ return document.getElementById("emailInput").value; }
function getPass(){ return document.getElementById("passInput").value; }

function login(){
  let e = getEmail();
  let p = getPass();

  if(!e || !p){
    alert("Llena todo");
    return;
  }

  usuario = e;
  entrarEquipos();
}

function crearCuenta(){
  let e = getEmail();
  let p = getPass();

  if(!e || !p){
    alert("Llena todo");
    return;
  }

  usuario = e;
  alert("Cuenta creada");
  entrarEquipos();
}

function invitado(){
  usuario = "invitado";
  entrarEquipos();
}

function entrarEquipos(){
  document.getElementById("login").style.display="none";
  document.getElementById("equipos").style.display="block";
  renderEquipos();
}

function crearEquipo(){
  let nombre = prompt("Nombre equipo");
  if(!nombre) return;

  let equipos = JSON.parse(localStorage.getItem("equipos")) || [];
  equipos.push({nombre, jugadores:[], historial:[]});
  localStorage.setItem("equipos", JSON.stringify(equipos));

  renderEquipos();
}

function renderEquipos(){
  let equipos = JSON.parse(localStorage.getItem("equipos")) || [];

  let cont = document.getElementById("listaEquipos");
  cont.innerHTML="";

  equipos.forEach((e,i)=>{
    cont.innerHTML += `
    <div class="card">
      ${e.nombre}<br>
      <button onclick="entrarEquipo(${i})">Entrar</button>
      <button onclick="eliminarEquipo(${i})">❌</button>
    </div>`;
  });
}

function eliminarEquipo(i){
  let equipos = JSON.parse(localStorage.getItem("equipos"));
  equipos.splice(i,1);
  localStorage.setItem("equipos", JSON.stringify(equipos));
  renderEquipos();
}

function entrarEquipo(i){
  let equipos = JSON.parse(localStorage.getItem("equipos"));
  equipoActual = i;
  jugadores = equipos[i].jugadores || [];
  historial = equipos[i].historial || [];

  document.getElementById("equipos").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("teamName").innerText = equipos[i].nombre;
  renderJugadores();
}

function guardarEquipo(){
  let equipos = JSON.parse(localStorage.getItem("equipos"));
  equipos[equipoActual].jugadores = jugadores;
  equipos[equipoActual].historial = historial;
  localStorage.setItem("equipos", JSON.stringify(equipos));
}

function agregarJugador(){
  let n = prompt("Nombre jugador");
  if(!n) return;

  jugadores.push({nombre:n, AB:0, H:0, HR:0});
  renderJugadores();
}

function renderJugadores(){
  let div = document.getElementById("jugadores");
  div.innerHTML="";

  jugadores.forEach((j,i)=>{
    let avg = j.AB ? (j.H/j.AB).toFixed(3) : 0;

    div.innerHTML += `
    <div class="card">
      ${j.nombre}<br>
      AB:${j.AB} H:${j.H} HR:${j.HR} AVG:${avg}<br>

      <button class="out" onclick="out(${i})">OUT</button>
      <button class="hit" onclick="hit(${i})">HIT</button>
      <button class="hr" onclick="hr(${i})">HR</button>
    </div>`;
  });
}

function out(i){ jugadores[i].AB++; renderJugadores(); }
function hit(i){ jugadores[i].AB++; jugadores[i].H++; renderJugadores(); }
function hr(i){ jugadores[i].AB++; jugadores[i].H++; jugadores[i].HR++; renderJugadores(); }

function guardarDia(){
  historial.push(JSON.parse(JSON.stringify(jugadores)));
  guardarEquipo();
  alert("Guardado");
}

function verHistorial(){
  if(historial.length==0){
    alert("No hay historial");
    return;
  }

  let txt="Historial:\n";
  historial.forEach((d,i)=>{
    txt+="Día "+(i+1)+"\n";
    d.forEach(j=>{
      txt+=j.nombre+" AVG:"+(j.AB?(j.H/j.AB).toFixed(3):0)+"\n";
    });
  });

  alert(txt);
}

function verRanking(){
  let lista=[...jugadores];

  lista.sort((a,b)=>{
    let A=a.AB?a.H/a.AB:0;
    let B=b.AB?b.H/b.AB:0;
    return B-A;
  });

  let txt="Ranking:\n";
  lista.forEach((j,i)=>{
    txt+=(i+1)+". "+j.nombre+"\n";
  });

  alert(txt);
}

function rankingGlobal(){
  let equipos = JSON.parse(localStorage.getItem("equipos")) || [];
  let todos=[];

  equipos.forEach(e=>{
    e.jugadores.forEach(j=>todos.push(j));
  });

  todos.sort((a,b)=>{
    let A=a.AB?a.H/a.AB:0;
    let B=b.AB?b.H/b.AB:0;
    return B-A;
  });

  let txt="GLOBAL:\n";
  todos.forEach((j,i)=>{
    txt+=(i+1)+". "+j.nombre+"\n";
  });

  alert(txt);
}

function nuevaTemp(){
  jugadores.forEach(j=>{
    j.AB=0; j.H=0; j.HR=0;
  });
  renderJugadores();
}

function salir(){
  location.reload();
}
</script>

</body>
</html>
