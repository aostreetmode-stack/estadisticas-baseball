<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Softball Stats Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1f2a38;
  color:white;
}

h1{text-align:center;}

.card{
  background:#2f3c4f;
  padding:10px;
  margin:10px;
  border-radius:15px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:18px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  font-size:16px;
}

.out{background:red;color:white;}
.hit{background:#ccc;}
.hr{background:green;color:white;}
.delete{
  background:red;
  float:right;
}

.top{
  background:#2f3c4f;
  padding:10px;
  border-radius:15px;
  margin:10px;
}

#loginScreen{padding:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>Login</h1>
  <input id="email" placeholder="Email">
  <br><br>
  <input id="password" type="password" placeholder="Password">
  <br><br>
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Crear cuenta</button>
  <button onclick="guest()">Invitado</button>
</div>

<!-- APP -->
<div id="appScreen" style="display:none">

<h1>⚾ Estadísticas Softball</h1>

<div class="top" id="lideres"></div>

<div id="players"></div>

<div style="padding:10px;">
  <button onclick="guardarDia()">Guardar día</button>
  <button onclick="verHistorial()">Historial</button>
  <button onclick="verRanking()">Ranking</button>
  <button onclick="nuevaTemporada()">Nueva temporada</button>
  <button onclick="logout()">Cerrar sesión</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signInAnonymously,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDF4CBmDYdhWWdML55_mh4x4wUpTp2-tg",
  authDomain: "softball-stats-44e46.firebaseapp.com",
  projectId: "softball-stats-44e46",
  storageBucket: "softball-stats-44e46.appspot.com",
  messagingSenderId: "239247616602",
  appId: "1:239247616602:web:5606cc1c8d25f99d20c663"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
  .catch(e=>alert(e.message));
};

window.register = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
  .then(()=>alert("Cuenta creada"))
  .catch(e=>alert(e.message));
};

window.guest = () => {
  signInAnonymously(auth);
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth,user=>{
  if(user){
    loginScreen.style.display="none";
    appScreen.style.display="block";
  }else{
    loginScreen.style.display="block";
    appScreen.style.display="none";
  }
});

</script>

<script>

let players = JSON.parse(localStorage.getItem("players")) || [];

function save(){localStorage.setItem("players",JSON.stringify(players));}

function render(){
  let html="";
  players.forEach((p,i)=>{

    html+=`
    <div class="card">

      <button class="delete" onclick="del(${i})">X</button>

      <input value="${p.name}" ${p.locked?"disabled":""}
      onblur="lock(${i},this.value)">

      <p>#${i+1} | AB:${p.ab} H:${p.h} HR:${p.hr} AVG:${calc(p)}</p>

      <button class="out" onclick="out(${i})">OUT</button>
      <button class="hit" onclick="hit(${i})">HIT</button>
      <button class="hr" onclick="hr(${i})">HR</button>

    </div>`;
  });

  playersDiv.innerHTML=html;
  lideres();
}

function lock(i,name){
  if(name.trim()==="")return;
  players[i].name=name;
  players[i].locked=true;
  save();
  render();
}

function add(){
  players.push({name:"Jugador",ab:0,h:0,hr:0,locked:false});
  save();render();
}

function del(i){
  players.splice(i,1);
  save();render();
}

function out(i){players[i].ab++;save();render();}
function hit(i){players[i].ab++;players[i].h++;save();render();}
function hr(i){players[i].ab++;players[i].h++;players[i].hr++;save();render();}

function calc(p){return p.ab? (p.h/p.ab).toFixed(3):"0.000";}

function lideres(){
  if(players.length===0){lideresDiv.innerHTML="No hay datos";return;}
  let avg=players.reduce((a,b)=> calc(b)>calc(a)?b:a);
  let hr=players.reduce((a,b)=> b.hr>a.hr?b:a);
  lideresDiv.innerHTML=`🏆 AVG líder: ${avg.name} (${calc(avg)})<br>💣 HR líder: ${hr.name} (${hr.hr})`;
}

function guardarDia(){
  let texto=new Date().toLocaleString()+"\n";
  players.forEach(p=>{
    texto+=`${p.name} | H:${p.h} HR:${p.hr} AVG:${calc(p)}\n`;
  });
  let hist=JSON.parse(localStorage.getItem("historial"))||[];
  hist.push(texto);
  localStorage.setItem("historial",JSON.stringify(hist));
  alert("Guardado");
}

function verHistorial(){
  let hist=JSON.parse(localStorage.getItem("historial"))||[];
  alert(hist.join("\n\n"));
}

function verRanking(){
  let r=[...players].sort((a,b)=>calc(b)-calc(a));
  let texto="RANKING\n\n";
  r.forEach((p,i)=>{
    texto+=`${i+1}. ${p.name} AVG:${calc(p)} HR:${p.hr}\n`;
  });
  alert(texto);
}

function nuevaTemporada(){
  players.forEach(p=>{p.ab=0;p.h=0;p.hr=0;});
  save();render();
}

render();

</script>

</body>
</html>
